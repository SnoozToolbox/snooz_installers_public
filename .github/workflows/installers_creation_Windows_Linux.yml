name: Build installers (Windows/Linux)

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: Build Windows installer
        required: true
        type: boolean
        default: true
      build_linux:
        description: Build Linux installer (deb + zip)
        required: true
        type: boolean
        default: true
      freeze_only:
        description: Freeze only and upload target folder for debug
        required: true
        type: boolean
        default: false
      runtime_smoke_test:
        description: Run runtime completion smoke tests on executable and installer outputs
        required: true
        type: boolean
        default: true
      source_repo:
        description: Source repository (owner/name or repo only; owner defaults to SnoozToolbox)
        required: true
        default: SnoozToolbox/snooz-toolbox
      source_ref:
        description: Branch, tag, or commit SHA from source_repo
        required: true
        default: main
      upload_artifacts:
        description: Upload installers as workflow artifacts
        required: true
        type: boolean
        default: false
      publish_to_release:
        description: Upload installers to a GitHub Release
        required: true
        type: boolean
        default: false
      release_tag:
        description: Release tag (required when publish_to_release is true)
        required: false
        default: ''
      release_name:
        description: Release name (optional)
        required: false
        default: ''
      release_draft:
        description: Create/update release as draft
        required: true
        type: boolean
        default: true
      release_prerelease:
        description: Mark release as prerelease
        required: true
        type: boolean
        default: true

jobs:
  build_windows:
    runs-on: windows-2022
    if: ${{ inputs.build_windows }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          repository: ${{ contains(inputs.source_repo, '/') && inputs.source_repo || format('SnoozToolbox/{0}', inputs.source_repo) }}
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.GH_PAT }}

      - name: Patch is_dev for release
        shell: pwsh
        run: |
          $file = "src/main/python/config.py"
          (Get-Content $file) -replace 'is_dev = True', 'is_dev = False' | Set-Content $file

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10.11'

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          $maxAttempts = 5
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            curl.exe --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 --connect-timeout 20 --max-time 180 `
              -H "Accept: application/octet-stream" `
              -H "Authorization: Bearer ${{ secrets.GH_PAT }}" `
              -H "X-GitHub-Api-Version: 2022-11-28" `
              -o fbs-pro.tar.gz `
              "https://api.github.com/repos/SnoozToolbox/fbs-pro-version/releases/assets/${{ secrets.FBS_ASSET_ID }}"

            if ($LASTEXITCODE -eq 0 -and (Test-Path "fbs-pro.tar.gz") -and ((Get-Item "fbs-pro.tar.gz").Length -gt 0)) {
              break
            }

            if ($attempt -eq $maxAttempts) {
              throw "Failed to download fbs-pro.tar.gz after $maxAttempts attempts"
            }

            Write-Host "Retrying fbs-pro download (attempt $attempt/$maxAttempts)"
            Start-Sleep -Seconds (3 * $attempt)
          }

          pip install fbs-pro.tar.gz

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          choco install vcredist2010 -y
          choco install vcredist2012 -y

      - name: Verify makensis is available
        shell: pwsh
        run: |
          $nsisPath = "C:\Program Files (x86)\NSIS"
          $makensisExe = Join-Path $nsisPath "makensis.exe"
          if (-not (Test-Path $makensisExe)) {
            throw "makensis.exe not found at expected path: $makensisExe"
          }
          $nsisPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & $makensisExe /VERSION

      - name: Freeze app with fbs
        shell: pwsh
        run: |
          fbs freeze

      - name: Runtime completion smoke test on executable (Windows)
        if: ${{ inputs.runtime_smoke_test && !inputs.freeze_only }}
        shell: pwsh
        run: |
          $processJson = "runtime-smoke/snooz_runtime_smoke.json"
          if (-not (Test-Path $processJson)) {
            throw "Runtime smoke process JSON not found: $processJson"
          }

          $edfLocalPath = "runtime_smoke_repo/_runtime_data/learn-nsrr01.edf"
          New-Item -ItemType Directory -Path (Split-Path $edfLocalPath -Parent) -Force | Out-Null
          curl.exe --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 --connect-timeout 20 --max-time 600 -o $edfLocalPath "https://github.com/SnoozToolbox/snooz-datasets/releases/download/latest/learn-nsrr01.edf"
          if (-not (Test-Path $edfLocalPath) -or ((Get-Item $edfLocalPath).Length -le 0)) {
            throw "Runtime smoke EDF download failed: $edfLocalPath"
          }
          $outputPdf = "runtime_smoke_repo/_runtime_data/learn-nsrr01_hypnodensity_plot.pdf"
          Remove-Item -Path $outputPdf -Force -ErrorAction SilentlyContinue

          $expectedAppDir = Join-Path "target" "Snooz Toolbox"
          $expectedInternal = Join-Path $expectedAppDir "_internal"
          $appExe = Join-Path $expectedAppDir "Snooz Toolbox.exe"
          if (-not (Test-Path $expectedInternal)) {
            Write-Host "Directories under target:"
            Get-ChildItem -Path "target" -Directory | Select-Object -ExpandProperty FullName
            throw "Expected frozen app internal directory not found: $expectedInternal"
          }
          if (-not (Test-Path $appExe)) {
            Write-Host "Executable candidates under target:"
            Get-ChildItem -Path "target" -Recurse -File |
              Where-Object { $_.Extension -eq '.exe' } |
              Sort-Object FullName |
              Select-Object -ExpandProperty FullName
            throw "Expected frozen app executable not found: $appExe"
          }
          Write-Host "Detected Windows frozen executable: $appExe"

          $logDir = Join-Path "target" "smoke-logs"
          New-Item -ItemType Directory -Path $logDir -Force | Out-Null
          $logFile = Join-Path $logDir "windows-frozen-runtime-smoke.log"
          Set-Content -Path $logFile -Value $null
          Remove-Item -Path "runtime-smoke/snooz_runtime_smoke_*.log" -Force -ErrorAction SilentlyContinue
          Write-Host "Launching runtime smoke executable (streaming output): $appExe --f $processJson"
          & $appExe --f $processJson 2>&1 | Tee-Object -FilePath $logFile
          $appStatus = $LASTEXITCODE

          $snoozProcessLog = Get-ChildItem -Path "runtime-smoke" -Filter "snooz_runtime_smoke_*.log" -File -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -ne $snoozProcessLog) {
            Write-Host "Detected Snooz process log: $($snoozProcessLog.FullName)"
            Write-Host "--- Snooz process log (last 200 lines) ---"
            Get-Content -Path $snoozProcessLog.FullName -Tail 200
          }
          else {
            Write-Host "::warning::No Snooz process log found next to process JSON (pattern: runtime-smoke/snooz_runtime_smoke_*.log)"
          }

          Write-Host "Captured runtime smoke output lines: $((Get-Content $logFile | Measure-Object -Line).Lines)"
          Write-Host "Runtime smoke log file: $logFile"
          if ($appStatus -ne 0) {
            throw "Runtime smoke execution on frozen executable exited with status $appStatus"
          }

          if (-not (Test-Path $edfLocalPath) -or ((Get-Item $edfLocalPath).Length -le 0)) {
            throw "Runtime smoke input EDF is missing or empty after execution: $edfLocalPath"
          }

          if (Select-String -Path $logFile -Pattern "ERROR Could not|^ERROR|ModuleNotFoundError|ImportError|Traceback|FileNotFoundError" -Quiet) {
            throw "Runtime smoke execution on frozen executable reported errors in logs"
          }

          if (-not (Select-String -Path $logFile -Pattern "Process completed\." -Quiet)) {
            Write-Host "Last 200 log lines (for diagnostics):"
            Get-Content $logFile -Tail 200
            Write-Host "runtime_smoke_repo content (for diagnostics):"
            if (Test-Path "runtime_smoke_repo") {
              Get-ChildItem -Path "runtime_smoke_repo" -Recurse -File |
                Sort-Object FullName |
                Select-Object -ExpandProperty FullName
            }
            else {
              Write-Host "runtime_smoke_repo directory not found"
            }
            throw "Runtime smoke execution on frozen executable did not reach 'Process completed.'"
          }

          if (-not (Test-Path $outputPdf) -or ((Get-Item $outputPdf).Length -le 0)) {
            Write-Host "runtime_smoke_repo content (for diagnostics):"
            if (Test-Path "runtime_smoke_repo") {
              Get-ChildItem -Path "runtime_smoke_repo" -Recurse -File |
                Sort-Object FullName |
                Select-Object -ExpandProperty FullName
            }
            else {
              Write-Host "runtime_smoke_repo directory not found"
            }
            throw "Expected runtime smoke PDF was not generated: $outputPdf"
          }
          $outputPdfSize = (Get-Item $outputPdf).Length
          Write-Host "Verified runtime smoke PDF: $outputPdf (size: $outputPdfSize bytes)"

      - name: Build installer with fbs (Windows)
        if: ${{ !inputs.freeze_only }}
        shell: pwsh
        run: |
          fbs installer

      - name: Runtime completion smoke test on installer (Windows)
        if: ${{ inputs.runtime_smoke_test && !inputs.freeze_only }}
        shell: pwsh
        run: |
          $processJson = "runtime-smoke/snooz_runtime_smoke.json"
          if (-not (Test-Path $processJson)) {
            throw "Runtime smoke process JSON not found: $processJson"
          }

          $edfLocalPath = "runtime_smoke_repo/_runtime_data/learn-nsrr01.edf"
          if (-not (Test-Path $edfLocalPath)) {
            New-Item -ItemType Directory -Path (Split-Path $edfLocalPath -Parent) -Force | Out-Null
            curl.exe --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 --connect-timeout 20 --max-time 600 -o $edfLocalPath "https://github.com/SnoozToolbox/snooz-datasets/releases/download/latest/learn-nsrr01.edf"
          }
          if (-not (Test-Path $edfLocalPath) -or ((Get-Item $edfLocalPath).Length -le 0)) {
            throw "Runtime smoke EDF input missing before installer execution: $edfLocalPath"
          }
          $outputPdf = "runtime_smoke_repo/_runtime_data/learn-nsrr01_hypnodensity_plot.pdf"
          Remove-Item -Path $outputPdf -Force -ErrorAction SilentlyContinue

          $installer = Get-ChildItem -Path target -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "No Windows installer executable found in target"
          }

          $installDir = "C:\snooz_ci_install"
          if (Test-Path $installDir) {
            Remove-Item -Path $installDir -Recurse -Force
          }

          $installerArgs = @('/S', "/D=$installDir")
          Write-Host "Launching silent installer: $($installer.FullName) $($installerArgs -join ' ')"
          $installProcess = Start-Process -FilePath $installer.FullName -ArgumentList $installerArgs -Wait -PassThru
          if ($installProcess.ExitCode -ne 0) {
            throw "Silent installer failed with status $($installProcess.ExitCode)"
          }

          $installedAppDir = Join-Path $installDir "Snooz Toolbox"
          if (-not (Test-Path (Join-Path $installedAppDir "_internal"))) {
            $installedAppDir = $installDir
          }

          $installedInternal = Join-Path $installedAppDir "_internal"
          if (-not (Test-Path $installedInternal)) {
            Write-Host "Directories under install dir:"
            Get-ChildItem -Path $installDir -Directory -Recurse | Select-Object -ExpandProperty FullName
            throw "Expected installed app internal directory not found under either '$installDir\\Snooz Toolbox' or '$installDir'"
          }

          $installedExe = Join-Path $installedAppDir "Snooz Toolbox.exe"
          if (-not (Test-Path $installedExe)) {
            $installedExe = Get-ChildItem -Path $installedAppDir -Filter "*.exe" -Recurse -File |
              Where-Object { $_.Name -notmatch 'unins|uninstall' } |
              Sort-Object FullName |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $installedExe -or -not (Test-Path $installedExe)) {
            Write-Host "Executable candidates under install dir:"
            Get-ChildItem -Path $installDir -Filter "*.exe" -Recurse -File |
              Sort-Object FullName |
              Select-Object -ExpandProperty FullName
            throw "Expected installed executable not found under '$installedAppDir'"
          }

          Write-Host "Detected installed app directory: $installedAppDir"
          Write-Host "Detected installed executable: $installedExe"

          $logDir = Join-Path "target" "smoke-logs"
          New-Item -ItemType Directory -Path $logDir -Force | Out-Null
          $logFile = Join-Path $logDir "windows-installer-runtime-smoke.log"
          Set-Content -Path $logFile -Value $null
          Remove-Item -Path "runtime-smoke/snooz_runtime_smoke_*.log" -Force -ErrorAction SilentlyContinue
          Write-Host "Launching installed runtime smoke executable (streaming output): $installedExe --f $processJson"
          & $installedExe --f $processJson 2>&1 | Tee-Object -FilePath $logFile
          $appStatus = $LASTEXITCODE

          $snoozProcessLog = Get-ChildItem -Path "runtime-smoke" -Filter "snooz_runtime_smoke_*.log" -File -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -ne $snoozProcessLog) {
            Write-Host "Detected Snooz process log: $($snoozProcessLog.FullName)"
            Write-Host "--- Snooz process log (last 200 lines) ---"
            Get-Content -Path $snoozProcessLog.FullName -Tail 200
          }
          else {
            Write-Host "::warning::No Snooz process log found next to process JSON (pattern: runtime-smoke/snooz_runtime_smoke_*.log)"
          }

          Write-Host "Captured runtime smoke output lines: $((Get-Content $logFile | Measure-Object -Line).Lines)"
          Write-Host "Runtime smoke log file: $logFile"
          if ($appStatus -ne 0) {
            throw "Runtime smoke execution from installer output exited with status $appStatus"
          }

          if (-not (Test-Path $edfLocalPath) -or ((Get-Item $edfLocalPath).Length -le 0)) {
            throw "Runtime smoke input EDF is missing or empty after installer execution: $edfLocalPath"
          }

          if (Select-String -Path $logFile -Pattern "ERROR Could not|^ERROR|ModuleNotFoundError|ImportError|Traceback|FileNotFoundError" -Quiet) {
            throw "Runtime smoke execution from installer output reported errors in logs"
          }

          if (-not (Select-String -Path $logFile -Pattern "Process completed\." -Quiet)) {
            Write-Host "Last 200 log lines (for diagnostics):"
            Get-Content $logFile -Tail 200
            Write-Host "runtime_smoke_repo content (for diagnostics):"
            if (Test-Path "runtime_smoke_repo") {
              Get-ChildItem -Path "runtime_smoke_repo" -Recurse -File |
                Sort-Object FullName |
                Select-Object -ExpandProperty FullName
            }
            else {
              Write-Host "runtime_smoke_repo directory not found"
            }
            throw "Runtime smoke execution from installer output did not reach 'Process completed.'"
          }

          if (-not (Test-Path $outputPdf) -or ((Get-Item $outputPdf).Length -le 0)) {
            Write-Host "runtime_smoke_repo content (for diagnostics):"
            if (Test-Path "runtime_smoke_repo") {
              Get-ChildItem -Path "runtime_smoke_repo" -Recurse -File |
                Sort-Object FullName |
                Select-Object -ExpandProperty FullName
            }
            else {
              Write-Host "runtime_smoke_repo directory not found"
            }
            throw "Expected runtime smoke PDF was not generated: $outputPdf"
          }
          $outputPdfSize = (Get-Item $outputPdf).Length
          Write-Host "Verified runtime smoke PDF: $outputPdf (size: $outputPdfSize bytes)"

      - name: Upload Windows installer artifact
        if: ${{ inputs.upload_artifacts || inputs.freeze_only }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozSetup.exe
          path: target/*.exe
          retention-days: 2

      - name: Upload target folder for debug (Windows)
        if: ${{ inputs.upload_artifacts || inputs.freeze_only }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozTarget-windows
          path: target/**
          retention-days: 2

      - name: Upload Windows smoke logs on failure
        if: ${{ failure() && inputs.runtime_smoke_test }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozSmokeLogs-windows
          path: target/smoke-logs/**
          retention-days: 2
          if-no-files-found: warn

      - name: Publish Windows installer to Release
        if: ${{ inputs.publish_to_release && !inputs.freeze_only && inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.release_tag }}
          draft: ${{ inputs.release_draft }}
          prerelease: ${{ inputs.release_prerelease }}
          files: target/*.exe
          fail_on_unmatched_files: true

  build_linux:
    runs-on: ubuntu-22.04
    if: ${{ inputs.build_linux }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          repository: ${{ contains(inputs.source_repo, '/') && inputs.source_repo || format('SnoozToolbox/{0}', inputs.source_repo) }}
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.GH_PAT }}

      - name: Patch is_dev for release
        run: |
          sed -i 's/is_dev = True/is_dev = False/' src/main/python/config.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          MAX_ATTEMPTS=5
          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            curl --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 --connect-timeout 20 --max-time 180 \
              -H "Accept: application/octet-stream" \
              -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -o fbs-pro.tar.gz \
              "https://api.github.com/repos/SnoozToolbox/fbs-pro-version/releases/assets/${{ secrets.FBS_ASSET_ID }}" && break

            if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
              echo "Failed to download fbs-pro.tar.gz after $MAX_ATTEMPTS attempts"
              exit 1
            fi

            echo "Retrying fbs-pro download (attempt $ATTEMPT/$MAX_ATTEMPTS)"
            sleep $((ATTEMPT * 3))
          done

          test -s fbs-pro.tar.gz
          pip install fbs-pro.tar.gz

      - name: Install fpm
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rubygems zip
          sudo gem install --no-document fpm
          fpm --version

      - name: Freeze app with fbs
        run: |
          fbs freeze

      - name: Runtime completion smoke test on executable (Linux)
        if: ${{ inputs.runtime_smoke_test && !inputs.freeze_only }}
        run: |
          set -eo pipefail
          PROCESS_JSON_SRC="runtime-smoke/snooz_runtime_smoke.json"
          if [ ! -f "$PROCESS_JSON_SRC" ]; then
            echo "::error::Runtime smoke process JSON not found: $PROCESS_JSON_SRC"
            find . -maxdepth 4 -type f | sort || true
            exit 1
          fi

          EDF_LOCAL_PATH="runtime_smoke_repo/_runtime_data/learn-nsrr01.edf"
          mkdir -p "$(dirname "$EDF_LOCAL_PATH")"
          curl --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 \
            --connect-timeout 20 --max-time 600 \
            -o "$EDF_LOCAL_PATH" \
            "https://github.com/SnoozToolbox/snooz-datasets/releases/download/latest/learn-nsrr01.edf"
          test -s "$EDF_LOCAL_PATH"
          OUTPUT_PDF="runtime_smoke_repo/_runtime_data/learn-nsrr01_hypnodensity_plot.pdf"
          rm -f "$OUTPUT_PDF"

          APP_DIR="target/Snooz Toolbox"
          APP_EXEC="$APP_DIR/Snooz Toolbox"
          if [ ! -d "$APP_DIR/_internal" ]; then
            echo "::error::Expected frozen app internal directory not found: $APP_DIR/_internal"
            find target -mindepth 1 -maxdepth 1 -type d | sort || true
            exit 1
          fi
          if [ ! -x "$APP_EXEC" ]; then
            echo "::error::Expected frozen app executable not found or not executable: $APP_EXEC"
            find target -type f -perm -111 ! -path '*/_internal/*' | sort || true
            exit 1
          fi
          echo "Detected Linux frozen executable: $APP_EXEC"

          LOG_DIR="target/smoke-logs"
          mkdir -p "$LOG_DIR"
          LOG_FILE="$LOG_DIR/linux-frozen-runtime-smoke.log"
          : > "$LOG_FILE"
          rm -f runtime-smoke/snooz_runtime_smoke_*.log

          set +e
          "$APP_EXEC" --f "$PROCESS_JSON_SRC" >"$LOG_FILE" 2>&1
          APP_STATUS=$?
          set -e

          SNOOZ_PROCESS_LOG="$(ls -1t runtime-smoke/snooz_runtime_smoke_*.log 2>/dev/null | head -n 1 || true)"
          if [ -n "$SNOOZ_PROCESS_LOG" ]; then
            echo "Detected Snooz process log: $SNOOZ_PROCESS_LOG"
            echo "--- Snooz process log (last 200 lines) ---"
            tail -n 200 "$SNOOZ_PROCESS_LOG" || true
          else
            echo "::warning::No Snooz process log found next to process JSON (pattern: runtime-smoke/snooz_runtime_smoke_*.log)"
          fi

          cat "$LOG_FILE" || true
          if [ "$APP_STATUS" -ne 0 ]; then
            echo "::error::Runtime smoke execution on frozen executable exited with status $APP_STATUS"
            exit "$APP_STATUS"
          fi

          if [ ! -s "$EDF_LOCAL_PATH" ]; then
            echo "::error::Runtime smoke input EDF is missing or empty after execution: $EDF_LOCAL_PATH"
            exit 1
          fi

          if grep -Eqi "ERROR Could not|^ERROR|ModuleNotFoundError|ImportError|Traceback|FileNotFoundError" "$LOG_FILE"; then
            echo "::error::Runtime smoke execution on frozen executable reported errors in logs."
            exit 1
          fi

          if ! grep -q "Process completed\." "$LOG_FILE"; then
            echo "::error::Runtime smoke execution on frozen executable did not reach 'Process completed.'"
            exit 1
          fi

          if [ ! -s "$OUTPUT_PDF" ]; then
            echo "::error::Expected runtime smoke PDF was not generated: $OUTPUT_PDF"
            find runtime_smoke_repo -maxdepth 3 -type f | sort || true
            exit 1
          fi
          OUTPUT_PDF_SIZE="$(wc -c < "$OUTPUT_PDF" | tr -d ' ')"
          echo "Verified runtime smoke PDF: $OUTPUT_PDF (size: ${OUTPUT_PDF_SIZE} bytes)"

      - name: Build Linux installer (.deb)
        if: ${{ !inputs.freeze_only }}
        run: |
          fbs installer

      - name: Build Linux portable package (.zip)
        if: ${{ !inputs.freeze_only }}
        run: |
          APP_DIR="target/Snooz Toolbox"
          if [ ! -d "$APP_DIR/_internal" ]; then
            echo "::error::Expected frozen app internal directory not found: $APP_DIR/_internal"
            find target -mindepth 1 -maxdepth 1 -type d | sort || true
            exit 1
          fi

          cd target
          zip -r SnoozSetup-portable-linux.zip "$(basename "$APP_DIR")"

      - name: Validate Linux .deb install integration
        if: ${{ !inputs.freeze_only }}
        run: |
          set -eo pipefail
          if ! command -v desktop-file-validate >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y desktop-file-utils
          fi

          DEB_PATH="$(find target -maxdepth 1 -type f -name '*.deb' | head -n 1)"
          if [ -z "$DEB_PATH" ]; then
            echo "::error::No .deb installer found in target/."
            ls -la target || true
            exit 1
          fi

          sudo dpkg -i "$DEB_PATH"

          PKG_NAME="snooz-toolbox"
          DESKTOP_FILE="$(dpkg -L "$PKG_NAME" | grep -E '/applications/.*\.desktop$' | head -n 1 || true)"
          if [ -z "$DESKTOP_FILE" ]; then
            echo "::error::No desktop entry installed by package $PKG_NAME"
            dpkg -L "$PKG_NAME" | sort || true
            exit 1
          fi

          echo "Detected desktop file: $DESKTOP_FILE"
          desktop-file-validate "$DESKTOP_FILE"

          if grep -q '^NoDisplay=true' "$DESKTOP_FILE"; then
            echo "::error::Desktop entry is hidden (NoDisplay=true): $DESKTOP_FILE"
            cat "$DESKTOP_FILE"
            exit 1
          fi

          EXEC_LINE="$(awk -F= '/^Exec=/{print $2; exit}' "$DESKTOP_FILE")"
          if [ -z "$EXEC_LINE" ]; then
            echo "::error::Desktop file has no Exec entry: $DESKTOP_FILE"
            cat "$DESKTOP_FILE"
            exit 1
          fi

          EXEC_BIN="$(python3 -c 'import shlex,sys; line=sys.argv[1]; print((shlex.split(line) or [""])[0])' "$EXEC_LINE")"
          if [ -z "$EXEC_BIN" ]; then
            echo "::error::Unable to parse executable from desktop Exec line: $EXEC_LINE"
            cat "$DESKTOP_FILE"
            exit 1
          fi

          if [ ! -x "$EXEC_BIN" ]; then
            echo "::error::Desktop Exec binary not found or not executable: $EXEC_BIN"
            cat "$DESKTOP_FILE"
            exit 1
          fi

          echo "Desktop Exec binary resolved to: $EXEC_BIN"

      - name: Runtime completion smoke test on installer (Linux)
        if: ${{ inputs.runtime_smoke_test && !inputs.freeze_only }}
        run: |
          set -eo pipefail
          PROCESS_JSON_SRC="runtime-smoke/snooz_runtime_smoke.json"
          if [ ! -f "$PROCESS_JSON_SRC" ]; then
            echo "::error::Runtime smoke process JSON not found: $PROCESS_JSON_SRC"
            find . -maxdepth 4 -type f | sort || true
            exit 1
          fi

          EDF_LOCAL_PATH="runtime_smoke_repo/_runtime_data/learn-nsrr01.edf"
          mkdir -p "$(dirname "$EDF_LOCAL_PATH")"
          if [ ! -s "$EDF_LOCAL_PATH" ]; then
            curl --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 \
              --connect-timeout 20 --max-time 600 \
              -o "$EDF_LOCAL_PATH" \
              "https://github.com/SnoozToolbox/snooz-datasets/releases/download/latest/learn-nsrr01.edf"
          fi
          if [ ! -s "$EDF_LOCAL_PATH" ]; then
            echo "::error::Runtime smoke EDF input missing before installer execution: $EDF_LOCAL_PATH"
            exit 1
          fi
          OUTPUT_PDF="runtime_smoke_repo/_runtime_data/learn-nsrr01_hypnodensity_plot.pdf"
          rm -f "$OUTPUT_PDF"

          DEB_PATH="$(find target -maxdepth 1 -type f -name '*.deb' | head -n 1)"
          if [ -z "$DEB_PATH" ]; then
            echo "::error::No .deb installer found in target/."
            ls -la target || true
            exit 1
          fi

          EXTRACT_DIR="$(mktemp -d /tmp/snooz-deb-runtime-smoke.XXXXXX)"
          LOG_DIR="target/smoke-logs"
          mkdir -p "$LOG_DIR"
          LOG_FILE="$LOG_DIR/linux-installer-runtime-smoke.log"
          : > "$LOG_FILE"
          rm -f runtime-smoke/snooz_runtime_smoke_*.log
          cleanup() {
            rm -rf "$EXTRACT_DIR"
          }
          trap cleanup EXIT

          dpkg-deb -x "$DEB_PATH" "$EXTRACT_DIR"
          APP_EXEC="$(find "$EXTRACT_DIR" -type f -path '*/Snooz Toolbox/Snooz Toolbox' | head -n 1)"
          if [ -z "$APP_EXEC" ]; then
            APP_EXEC="$(find "$EXTRACT_DIR" -type f -perm -111 ! -path '*/_internal/*' | sort | head -n 1)"
          fi
          if [ -z "$APP_EXEC" ]; then
            echo "::error::No executable found in extracted .deb payload."
            echo "Executable candidates in extracted payload (excluding _internal):"
            find "$EXTRACT_DIR" -type f -perm -111 ! -path '*/_internal/*' | sort || true
            echo "Top-level files in extracted payload (excluding _internal):"
            find "$EXTRACT_DIR" -maxdepth 5 -type f ! -path '*/_internal/*' | sort || true
            exit 1
          fi
          echo "Detected Linux installed executable: $APP_EXEC"

          set +e
          "$APP_EXEC" --f "$PROCESS_JSON_SRC" >"$LOG_FILE" 2>&1
          APP_STATUS=$?
          set -e

          SNOOZ_PROCESS_LOG="$(ls -1t runtime-smoke/snooz_runtime_smoke_*.log 2>/dev/null | head -n 1 || true)"
          if [ -n "$SNOOZ_PROCESS_LOG" ]; then
            echo "Detected Snooz process log: $SNOOZ_PROCESS_LOG"
            echo "--- Snooz process log (last 200 lines) ---"
            tail -n 200 "$SNOOZ_PROCESS_LOG" || true
          else
            echo "::warning::No Snooz process log found next to process JSON (pattern: runtime-smoke/snooz_runtime_smoke_*.log)"
          fi

          cat "$LOG_FILE" || true
          if [ "$APP_STATUS" -ne 0 ]; then
            echo "::error::Runtime smoke execution from .deb payload exited with status $APP_STATUS"
            exit "$APP_STATUS"
          fi

          if [ ! -s "$EDF_LOCAL_PATH" ]; then
            echo "::error::Runtime smoke input EDF is missing or empty after .deb payload execution: $EDF_LOCAL_PATH"
            exit 1
          fi

          if grep -Eqi "ERROR Could not|^ERROR|ModuleNotFoundError|ImportError|Traceback|FileNotFoundError" "$LOG_FILE"; then
            echo "::error::Runtime smoke execution from .deb payload reported errors in logs."
            exit 1
          fi

          if ! grep -q "Process completed\." "$LOG_FILE"; then
            echo "::error::Runtime smoke execution from .deb payload did not reach 'Process completed.'"
            exit 1
          fi

          if [ ! -s "$OUTPUT_PDF" ]; then
            echo "::error::Expected runtime smoke PDF was not generated: $OUTPUT_PDF"
            find runtime_smoke_repo -maxdepth 3 -type f | sort || true
            exit 1
          fi
          OUTPUT_PDF_SIZE="$(wc -c < "$OUTPUT_PDF" | tr -d ' ')"
          echo "Verified runtime smoke PDF: $OUTPUT_PDF (size: ${OUTPUT_PDF_SIZE} bytes)"

      - name: Validate Linux package outputs
        if: ${{ !inputs.freeze_only }}
        run: |
          ls -la target
          ls target/*.deb
          ls target/*.zip

      - name: Upload Linux installer artifact
        if: ${{ inputs.upload_artifacts || inputs.freeze_only }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozSetup-linux
          path: |
            target/*.zip
            target/*.deb
          retention-days: 2

      - name: Upload target folder for debug (Linux)
        if: ${{ inputs.upload_artifacts || inputs.freeze_only }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozTarget-linux
          path: target/**
          retention-days: 2

      - name: Upload Linux smoke logs on failure
        if: ${{ failure() && inputs.runtime_smoke_test }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozSmokeLogs-linux
          path: target/smoke-logs/**
          retention-days: 2
          if-no-files-found: warn

      - name: Publish Linux installers to Release
        if: ${{ inputs.publish_to_release && !inputs.freeze_only && inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.release_tag }}
          draft: ${{ inputs.release_draft }}
          prerelease: ${{ inputs.release_prerelease }}
          files: |
            target/*.zip
            target/*.deb
          fail_on_unmatched_files: true
