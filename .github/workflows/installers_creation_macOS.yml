name: Build installers (macOS)

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      build_macos:
        description: 'Build macOS installer'
        required: true
        type: boolean
        default: true
      build_macos_intel:
        description: 'Build macOS Intel (x64) installer'
        required: true
        type: boolean
        default: true
      build_macos_arm64:
        description: 'Build macOS Apple Silicon (arm64) installer'
        required: true
        type: boolean
        default: true
      freeze_only:
        description: 'macOS debug mode: freeze only and upload target folder'
        required: true
        type: boolean
        default: false
      runtime_smoke_test:
        description: 'Run headless runtime smoke tests (frozen app and DMG) using a process JSON'
        required: true
        type: boolean
        default: false
      sign_macos:
        description: 'Sign and notarize macOS artifacts'
        required: true
        type: boolean
        default: true
      source_repo:
        description: 'Source repository (owner/name or repo only; owner defaults to SnoozToolbox)'
        required: true
        default: 'SnoozToolbox/snooz-toolbox'
      source_ref:
        description: 'Branch, tag, or commit SHA from source_repo'
        required: true
        default: 'main'
      upload_artifacts:
        description: 'Upload installers as workflow artifacts'
        required: true
        type: boolean
        default: false
      publish_to_release:
        description: 'Upload macOS DMG files to a GitHub Release'
        required: true
        type: boolean
        default: false
      release_tag:
        description: 'Release tag (required when publish_to_release is true)'
        required: false
        default: ''
      release_name:
        description: 'Release name (optional)'
        required: false
        default: ''
      release_draft:
        description: 'Create/update release as draft'
        required: true
        type: boolean
        default: true
      release_prerelease:
        description: 'Mark release as prerelease'
        required: true
        type: boolean
        default: true

jobs:
  build_dmg_intel:
    if: ${{ inputs.build_macos && inputs.build_macos_intel }}
    runs-on: [self-hosted, macOS, X64]
    env:
      APPLE_TEAM_ID: UDE82H2SDR
      APP_BUNDLE_ID: com.snooztoolbox
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          repository: ${{ contains(inputs.source_repo, '/') && inputs.source_repo || format('SnoozToolbox/{0}', inputs.source_repo) }}
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.GH_PAT }}

      - name: Patch is_dev for release
        run: |
          sed -i '' 's/is_dev = True/is_dev = False/' src/main/python/config.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10.11'

      - name: Print macOS architecture
        run: |
          echo "runner.os=${{ runner.os }}"
          echo "runner.arch=${{ runner.arch }}"
          echo "target.arch=x64"
          uname -m
          arch
          sysctl -n machdep.cpu.brand_string

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

          MAX_ATTEMPTS=5
          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            curl --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 --connect-timeout 20 --max-time 180 \
              -H "Accept: application/octet-stream" \
              -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -o fbs-pro.tar.gz \
              "https://api.github.com/repos/SnoozToolbox/fbs-pro-version/releases/assets/${{ secrets.FBS_ASSET_ID }}" && break

            if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
              echo "Failed to download fbs-pro.tar.gz after $MAX_ATTEMPTS attempts"
              exit 1
            fi

            echo "Retrying fbs-pro download (attempt $ATTEMPT/$MAX_ATTEMPTS)"
            sleep $((ATTEMPT * 3))
          done

          test -s fbs-pro.tar.gz
          pip install fbs-pro.tar.gz

      - name: Configure Apple signing certificate
        if: ${{ inputs.sign_macos }}
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_P12_PASSWORD }}
          APPLE_CI_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          security delete-keychain build.keychain >/dev/null 2>&1 || true
          security delete-keychain "$KEYCHAIN_PATH" >/dev/null 2>&1 || true
          printf '%s' "$APPLE_CERT_P12_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$APPLE_CI_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$APPLE_CI_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERT_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_CI_KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$HOME/Library/Keychains/login.keychain-db" "/Library/Keychains/System.keychain"
          rm -f certificate.p12

      - name: Freeze app with fbs
        run: |
          fbs freeze

      - name: Runtime smoke test from frozen app bundle (macOS x64)
        if: ${{ !inputs.freeze_only && inputs.runtime_smoke_test }}
        run: |
          set -eo pipefail
          PROCESS_JSON_SRC="runtime-smoke/snooz_runtime_smoke.json"
          if [ ! -f "$PROCESS_JSON_SRC" ]; then
            echo "::error::Runtime smoke process JSON not found: $PROCESS_JSON_SRC"
            find . -maxdepth 4 -type f | sort || true
            exit 1
          fi

          EDF_LOCAL_PATH="runtime_smoke_repo/_runtime_data/learn-nsrr01.edf"
          mkdir -p "$(dirname "$EDF_LOCAL_PATH")"
          echo "Downloading runtime smoke EDF to: $EDF_LOCAL_PATH"
          curl --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 \
            --connect-timeout 20 --max-time 600 \
            -o "$EDF_LOCAL_PATH" \
            "https://github.com/SnoozToolbox/snooz-datasets/releases/download/latest/learn-nsrr01.edf"
          test -s "$EDF_LOCAL_PATH"
          echo "Runtime smoke EDF ready at path for JSON: $EDF_LOCAL_PATH"

          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in target/."
            ls -la target || true
            exit 1
          fi

          APP_EXEC="$(find "$APP_PATH/Contents/MacOS" -maxdepth 1 -type f -perm -111 | head -n 1)"
          if [ -z "$APP_EXEC" ]; then
            echo "::error::No executable found in frozen app bundle."
            find "$APP_PATH/Contents/MacOS" -maxdepth 2 -print || true
            exit 1
          fi

          MNE_PKG_SRC="$(python - <<'PY'
          import importlib.util
          import pathlib

          spec = importlib.util.find_spec('mne')
          if spec is None or spec.origin is None:
              raise SystemExit(1)

          print(pathlib.Path(spec.origin).parent)
          PY
          )"
          if [ -z "$MNE_PKG_SRC" ]; then
            echo "::error::Unable to locate mne package in site-packages."
            exit 1
          fi
          APP_PATH="$APP_PATH" MNE_PKG_SRC="$MNE_PKG_SRC" python - <<'PY'
          import os
          import pathlib
          import shutil

          src = pathlib.Path(os.environ['MNE_PKG_SRC'])
          dst = pathlib.Path(os.environ['APP_PATH']) / 'Contents' / 'Frameworks' / 'mne'
          dst.mkdir(parents=True, exist_ok=True)

          count = 0
          for stub in src.rglob('*.pyi'):
              rel = stub.relative_to(src)
              out = dst / rel
              out.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(stub, out)
              count += 1

          if count == 0:
              raise SystemExit('No mne .pyi stubs found to copy')

          print(f'Prepared {count} mne stubs for runtime under {dst}')
          PY

          LOG_FILE="$(mktemp /tmp/snooz-freeze-runtime-smoke.XXXXXX.log)"
          cleanup() {
            rm -f "$LOG_FILE"
          }
          trap cleanup EXIT

          echo "Running runtime smoke test with process JSON: $PROCESS_JSON_SRC"
          set +e
          "$APP_EXEC" --f "$PROCESS_JSON_SRC" >"$LOG_FILE" 2>&1
          APP_STATUS=$?
          set -e

          cat "$LOG_FILE" || true
          if [ "$APP_STATUS" -ne 0 ]; then
            echo "::error::Runtime smoke execution on frozen app exited with status $APP_STATUS"
            exit "$APP_STATUS"
          fi

          if grep -Eqi "ERROR Could not|^ERROR|ModuleNotFoundError|ImportError|Traceback|FileNotFoundError" "$LOG_FILE"; then
            echo "::error::Runtime smoke execution on frozen app reported errors in logs."
            exit 1
          fi

          if ! grep -q "Process completed." "$LOG_FILE"; then
            echo "::error::Runtime smoke execution on frozen app did not reach 'Process completed.'"
            exit 1
          fi

      - name: Copy PSGReader extensions (macOS x64)
        run: |
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          mkdir -p "$APP_PATH/Contents/Resources/extension/PSGReader"
          cp -r src/main/resources/mac/extension/PSGReader/. "$APP_PATH/Contents/Resources/extension/PSGReader/"
          cp -r src/main/resources/mac/mac-X64/extension/PSGReader/. "$APP_PATH/Contents/Resources/extension/PSGReader/"

      - name: Runtime completion smoke test app bundle (macOS x64)
        if: ${{ !inputs.freeze_only && inputs.runtime_smoke_test }}
        run: |
          set -eo pipefail
          PROCESS_JSON_SRC="runtime-smoke/snooz_runtime_smoke.json"
          if [ ! -f "$PROCESS_JSON_SRC" ]; then
            echo "::error::Runtime smoke process JSON not found: $PROCESS_JSON_SRC"
            find . -maxdepth 4 -type f | sort || true
            exit 1
          fi

          EDF_LOCAL_PATH="runtime_smoke_repo/_runtime_data/learn-nsrr01.edf"
          mkdir -p "$(dirname "$EDF_LOCAL_PATH")"
          if [ ! -s "$EDF_LOCAL_PATH" ]; then
            echo "Downloading runtime smoke EDF to: $EDF_LOCAL_PATH"
            curl --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 \
              --connect-timeout 20 --max-time 600 \
              -o "$EDF_LOCAL_PATH" \
              "https://github.com/SnoozToolbox/snooz-datasets/releases/download/latest/learn-nsrr01.edf"
            test -s "$EDF_LOCAL_PATH"
          fi
          echo "Runtime smoke EDF ready at path for JSON: $EDF_LOCAL_PATH"

          APP_PATH="$(find target -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in target/."
            ls -la target || true
            exit 1
          fi

          APP_EXEC="$(find "$APP_PATH/Contents/MacOS" -maxdepth 1 -type f -perm -111 | head -n 1)"
          if [ -z "$APP_EXEC" ]; then
            echo "::error::No executable found inside app bundle."
            find "$APP_PATH/Contents/MacOS" -maxdepth 2 -print || true
            exit 1
          fi

          LOG_FILE="$(mktemp /tmp/snooz-app-runtime-smoke.XXXXXX.log)"
          cleanup() {
            rm -f "$LOG_FILE"
          }
          trap cleanup EXIT

          echo "Running app bundle runtime completion smoke with process JSON: $PROCESS_JSON_SRC"
          set +e
          "$APP_EXEC" --f "$PROCESS_JSON_SRC" >"$LOG_FILE" 2>&1
          APP_STATUS=$?
          set -e

          echo "--- App bundle runtime smoke log (last 200 lines) ---"
          tail -n 200 "$LOG_FILE" || true
          echo "APP_STATUS=$APP_STATUS"

          if [ "$APP_STATUS" -ne 0 ]; then
            echo "::error::App bundle runtime smoke exited with status $APP_STATUS"
            exit "$APP_STATUS"
          fi

          if grep -Eqi "ERROR Could not|^ERROR|ModuleNotFoundError|ImportError|Traceback|FileNotFoundError|Library not loaded|dlopen\\(" "$LOG_FILE"; then
            echo "::error::App bundle runtime smoke reported errors in logs."
            exit 1
          fi

          if ! grep -q "Process completed." "$LOG_FILE"; then
            echo "::error::App bundle runtime smoke did not reach 'Process completed.'"
            exit 1
          fi

          echo "App bundle runtime smoke verdict: PASS_COMPLETED"

      - name: Sign Snooz.app
        if: ${{ inputs.sign_macos && !inputs.freeze_only }}
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          # The app bundle name is stable in this workflow, so use the known path directly.
          APP_PATH="target/Snooz Toolbox.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Expected app bundle not found: $APP_PATH"
            ls -la target || true
            exit 1
          fi
          PLIST_PATH="$APP_PATH/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $APP_BUNDLE_ID" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string $APP_BUNDLE_ID" "$PLIST_PATH"

          find "$APP_PATH" -mindepth 1 -type d -name '*.app' -print0 | while IFS= read -r -d '' NESTED_APP; do
            codesign --force --options runtime --timestamp \
              --keychain "$KEYCHAIN_PATH" \
              --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
              "$NESTED_APP"
          done

          find "$APP_PATH" -type f -perm -111 ! -name '*.py' ! -name '*.pyc' ! -name '*.pyo' -print0 | while IFS= read -r -d '' BIN; do
            codesign --force --timestamp --options runtime \
              --keychain "$KEYCHAIN_PATH" \
              --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
              "$BIN"
          done

          find "$APP_PATH" -type f \( -name '*.so' -o -name '*.dylib' \) -print0 | while IFS= read -r -d '' BIN; do
            codesign --force --timestamp --options runtime \
              --keychain "$KEYCHAIN_PATH" \
              --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
              "$BIN"
          done

          find "$APP_PATH" -type f -name '*.pyi' -print0 | while IFS= read -r -d '' STUB; do
            codesign --force --timestamp \
              --keychain "$KEYCHAIN_PATH" \
              --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
              "$STUB"
          done

          MNE_FRAMEWORKS_DIR="$APP_PATH/Contents/Frameworks/mne"
          if [ -d "$MNE_FRAMEWORKS_DIR" ]; then
            # Sign the mne subtree explicitly because lazy_loader expects sibling stub files on disk.
            echo "Signing and verifying Frameworks/mne Python files"
            find "$MNE_FRAMEWORKS_DIR" -type f \( -name '*.py' -o -name '*.pyi' \) -print0 | while IFS= read -r -d '' MNE_FILE; do
              echo "Signing mne file: $MNE_FILE"
              codesign --force --timestamp \
                --keychain "$KEYCHAIN_PATH" \
                --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
                "$MNE_FILE"
              codesign --verify --verbose=2 "$MNE_FILE"
            done
            codesign --verify --deep --strict --verbose=2 "$MNE_FRAMEWORKS_DIR"
          fi

          codesign --force --deep --options runtime --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
            "$APP_PATH"
          # Final bundle verification after all nested signing steps.
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          if ! spctl -a -t exec -vv "$APP_PATH"; then
            echo "Pre-notarization spctl assessment rejected (expected on some CI hosts)."
          fi

      - name: Audit Frameworks .pyi signature status (macOS x64)
        if: ${{ inputs.sign_macos && !inputs.freeze_only }}
        run: |
          set -eo pipefail
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          FRAMEWORKS_DIR="$APP_PATH/Contents/Frameworks"
          if [ ! -d "$FRAMEWORKS_DIR" ]; then
            echo "No Frameworks directory found at $FRAMEWORKS_DIR"
            exit 0
          fi

          PYI_COUNT="$(find "$FRAMEWORKS_DIR" -type f -name '*.pyi' | wc -l | tr -d ' ')"
          echo "Frameworks .pyi file count: $PYI_COUNT"
          find "$FRAMEWORKS_DIR" -type f -name '*.pyi' | sort || true

          find "$FRAMEWORKS_DIR" -type f -name '*.pyi' -print0 | while IFS= read -r -d '' STUB; do
            echo "Verifying codesign on $STUB"
            codesign --verify --verbose=2 "$STUB"
          done

      - name: Notarize and staple Snooz.app
        if: ${{ inputs.sign_macos && !inputs.freeze_only }}
        run: |
          set -eo pipefail
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          APP_NAME="$(basename "$APP_PATH")"
          APP_ZIP="target/${APP_NAME}.zip"

          rm -f "$APP_ZIP"
          ditto -c -k --keepParent "$APP_PATH" "$APP_ZIP"

          APP_SUBMIT_OUTPUT="$(xcrun notarytool submit "$APP_ZIP" \
            --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
            --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)"

          echo "$APP_SUBMIT_OUTPUT"
          APP_NOTARY_STATUS="$(python -c "import json,sys; print(json.load(sys.stdin).get('status',''))" <<< "$APP_SUBMIT_OUTPUT")"
          APP_SUBMISSION_ID="$(python -c "import json,sys; print(json.load(sys.stdin).get('id',''))" <<< "$APP_SUBMIT_OUTPUT")"

          if [ "$APP_NOTARY_STATUS" != "Accepted" ]; then
            echo "App notarization failed with status: $APP_NOTARY_STATUS"
            if [ -n "$APP_SUBMISSION_ID" ]; then
              xcrun notarytool log "$APP_SUBMISSION_ID" \
                --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
                --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          rm -f "$APP_ZIP"

      - name: Build .dmg Installer
        if: ${{ !inputs.freeze_only }}
        run: |
          set -eo pipefail
          echo "Building DMG with fbs installer"
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          APP_NAME="$(basename "$APP_PATH")"
          APP_BASE_NAME="${APP_NAME%.app}"
          VOL_PATH="/Volumes/$APP_BASE_NAME"
          FINAL_DMG_PATH="target/${APP_BASE_NAME}.dmg"
          RW_DMG_PATH="target/rw.${APP_BASE_NAME}.dmg"

          cleanup_volume() {
            if mount | grep -q "on $VOL_PATH "; then
              echo "Detaching leftover mounted volume $VOL_PATH"
              hdiutil detach "$VOL_PATH" -force || true
            fi
          }

          cleanup_volume

          MAX_ATTEMPTS=3
          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            rm -f "$FINAL_DMG_PATH" "$RW_DMG_PATH"
            echo "fbs DMG attempt $ATTEMPT/$MAX_ATTEMPTS"

            set +e
            fbs installer
            FBS_STATUS=$?
            set -e

            cleanup_volume

            if [ -f "$FINAL_DMG_PATH" ]; then
              echo "DMG created successfully."
              break
            fi

            if [ -f "$RW_DMG_PATH" ]; then
              echo "Temporary rw DMG found. Attempting to recover final DMG."
              CONVERT_STATUS=1
              CONVERT_MAX_ATTEMPTS=5
              for CONVERT_ATTEMPT in $(seq 1 "$CONVERT_MAX_ATTEMPTS"); do
                rm -f "$FINAL_DMG_PATH"
                set +e
                hdiutil convert "$RW_DMG_PATH" -format UDZO -o "$FINAL_DMG_PATH"
                CONVERT_STATUS=$?
                set -e

                if [ "$CONVERT_STATUS" -eq 0 ] && [ -f "$FINAL_DMG_PATH" ]; then
                  break
                fi

                if [ "$CONVERT_ATTEMPT" -lt "$CONVERT_MAX_ATTEMPTS" ]; then
                  echo "hdiutil convert retry $CONVERT_ATTEMPT/$CONVERT_MAX_ATTEMPTS after transient failure."
                  sleep $((CONVERT_ATTEMPT * 2))
                fi
              done

              if [ "$CONVERT_STATUS" -eq 0 ] && [ -f "$FINAL_DMG_PATH" ]; then
                rm -f "$RW_DMG_PATH" || true
                echo "DMG recovered successfully from temporary image."
                break
              fi
            fi

            if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
              EXIT_CODE="$FBS_STATUS"
              if [ "$EXIT_CODE" -eq 0 ]; then
                EXIT_CODE=1
              fi
              echo "fbs installer failed after $MAX_ATTEMPTS attempts (last exit: $FBS_STATUS)."
              hdiutil info || true
              exit "$EXIT_CODE"
            fi

            echo "Retrying fbs installer after cleanup..."
            sleep 3
          done
          ls -la target/*.dmg

      - name: Verify required packages inside .dmg (macOS x64)
        if: ${{ !inputs.freeze_only }}
        run: |
          set -eo pipefail
          DMG_PATH="$(find target -maxdepth 1 -type f -name '*.dmg' ! -name 'rw.*' | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "::error::No final DMG found in target/."
            ls -la target || true
            exit 1
          fi

          MOUNT_DIR="$(mktemp -d /tmp/snooz-dmg-check.XXXXXX)"
          cleanup() {
            hdiutil detach "$MOUNT_DIR" -force >/dev/null 2>&1 || true
            rmdir "$MOUNT_DIR" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_DIR" -nobrowse -readonly
          APP_IN_DMG="$(find "$MOUNT_DIR" -maxdepth 2 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_IN_DMG" ]; then
            echo "::error::No .app bundle found inside DMG."
            find "$MOUNT_DIR" -maxdepth 3 -print || true
            exit 1
          fi

          for PKG in mne lazy_loader lspopt yasa; do
            if find "$APP_IN_DMG/Contents" \( -type d -name "$PKG" -o -type f -name "$PKG.py" \) -print -quit | grep -q .; then
              echo "Package found in DMG app bundle: $PKG"
            else
              echo "::warning::Package not found as loose file in DMG app bundle: $PKG (may be embedded in PyInstaller archive)"
            fi
          done

      - name: Smoke test app launch from .dmg (macOS x64)
        if: ${{ !inputs.freeze_only }}
        run: |
          set -eo pipefail
          DMG_PATH="$(find target -maxdepth 1 -type f -name '*.dmg' ! -name 'rw.*' | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "::error::No final DMG found in target/."
            ls -la target || true
            exit 1
          fi

          MOUNT_DIR="$(mktemp -d /tmp/snooz-dmg-smoke.XXXXXX)"
          LOG_FILE="$(mktemp /tmp/snooz-dmg-smoke.XXXXXX.log)"
          APP_PID=""
          cleanup() {
            if [ -n "$APP_PID" ] && kill -0 "$APP_PID" >/dev/null 2>&1; then
              kill "$APP_PID" >/dev/null 2>&1 || true
              wait "$APP_PID" >/dev/null 2>&1 || true
            fi
            hdiutil detach "$MOUNT_DIR" -force >/dev/null 2>&1 || true
            rmdir "$MOUNT_DIR" >/dev/null 2>&1 || true
            rm -f "$LOG_FILE"
          }
          trap cleanup EXIT

          hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_DIR" -nobrowse -readonly
          APP_IN_DMG="$(find "$MOUNT_DIR" -maxdepth 2 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_IN_DMG" ]; then
            echo "::error::No .app bundle found inside DMG."
            find "$MOUNT_DIR" -maxdepth 3 -print || true
            exit 1
          fi

          APP_EXEC="$(find "$APP_IN_DMG/Contents/MacOS" -maxdepth 1 -type f -perm -111 | head -n 1)"
          if [ -z "$APP_EXEC" ]; then
            echo "::error::No executable found in DMG app bundle."
            find "$APP_IN_DMG/Contents/MacOS" -maxdepth 2 -print || true
            exit 1
          fi
          echo "APP_EXEC=$APP_EXEC"

          "$APP_EXEC" >"$LOG_FILE" 2>&1 &
          APP_PID=$!
          echo "APP_PID=$APP_PID"
          sleep 20

          if ! kill -0 "$APP_PID" >/dev/null 2>&1; then
            set +e
            wait "$APP_PID"
            APP_STATUS=$?
            set -e
            echo "DMG app process exited during smoke window"
            cat "$LOG_FILE" || true
            if [ "$APP_STATUS" -ne 0 ]; then
              echo "::error::DMG app exited during smoke test with status $APP_STATUS"
              exit "$APP_STATUS"
            fi
          else
            echo "DMG app process is still running after smoke window"
          fi

          APP_NAME="$(basename "$APP_IN_DMG" .app)"
          echo "APP_NAME=$APP_NAME"
          GUI_RUNNING="$(osascript -e 'tell application "System Events" to (name of application processes) contains "'"$APP_NAME"'"' 2>/dev/null || true)"
          if [ "$GUI_RUNNING" != "true" ]; then
            echo "::error::DMG app binary is running but no GUI application process was detected for '$APP_NAME'."
            cat "$LOG_FILE" || true

            DIAG_LOG_FILE="$(mktemp /tmp/snooz-dmg-smoke-diag.XXXXXX.log)"
            echo "Collecting foreground launch diagnostics to capture explicit runtime errors..."
            set +e
            "$APP_EXEC" >"$DIAG_LOG_FILE" 2>&1 &
            DIAG_PID=$!
            sleep 25
            if kill -0 "$DIAG_PID" >/dev/null 2>&1; then
              kill "$DIAG_PID" >/dev/null 2>&1 || true
              wait "$DIAG_PID" >/dev/null 2>&1 || true
              DIAG_STATUS=124
            else
              wait "$DIAG_PID"
              DIAG_STATUS=$?
            fi
            set -e

            echo "Foreground diagnostic exit code: $DIAG_STATUS"
            cat "$DIAG_LOG_FILE" || true
            rm -f "$DIAG_LOG_FILE"
            exit 1
          fi

          WINDOW_COUNT="$(osascript -e 'tell application "System Events" to count windows of application process "'"$APP_NAME"'"' 2>/dev/null || true)"
          case "$WINDOW_COUNT" in
            ''|*[!0-9]*)
              echo "::error::Unable to confirm visible windows for '$APP_NAME' (raw result: $WINDOW_COUNT)."
              cat "$LOG_FILE" || true
              exit 1
              ;;
          esac
          if [ "$WINDOW_COUNT" -lt 1 ]; then
            echo "::error::DMG app launched but no visible window appeared for '$APP_NAME'."
            cat "$LOG_FILE" || true
            exit 1
          fi
          echo "Detected visible window count: $WINDOW_COUNT"

          if grep -Eqi "ModuleNotFoundError|ImportError|Traceback|Library not loaded|dlopen\\(" "$LOG_FILE"; then
            cat "$LOG_FILE" || true
            echo "::error::DMG app launch log contains import or dynamic library errors."
            exit 1
          fi

      - name: Runtime smoke test from .dmg (macOS x64)
        if: ${{ !inputs.freeze_only && inputs.runtime_smoke_test }}
        run: |
          set -eo pipefail
          PROCESS_JSON_SRC="runtime-smoke/snooz_runtime_smoke.json"
          if [ ! -f "$PROCESS_JSON_SRC" ]; then
            echo "::error::Runtime smoke process JSON not found: $PROCESS_JSON_SRC"
            find . -maxdepth 4 -type f | sort || true
            exit 1
          fi

          EDF_LOCAL_PATH="runtime_smoke_repo/_runtime_data/learn-nsrr01.edf"
          mkdir -p "$(dirname "$EDF_LOCAL_PATH")"
          echo "Downloading runtime smoke EDF to: $EDF_LOCAL_PATH"
          curl --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 \
            --connect-timeout 20 --max-time 600 \
            -o "$EDF_LOCAL_PATH" \
            "https://github.com/SnoozToolbox/snooz-datasets/releases/download/latest/learn-nsrr01.edf"
          test -s "$EDF_LOCAL_PATH"
          echo "Runtime smoke EDF ready at path for JSON: $EDF_LOCAL_PATH"

          DMG_PATH="$(find target -maxdepth 1 -type f -name '*.dmg' ! -name 'rw.*' | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "::error::No final DMG found in target/."
            ls -la target || true
            exit 1
          fi

          MOUNT_DIR="$(mktemp -d /tmp/snooz-dmg-runtime-smoke.XXXXXX)"
          LOG_FILE="$(mktemp /tmp/snooz-dmg-runtime-smoke.XXXXXX.log)"
          cleanup() {
            hdiutil detach "$MOUNT_DIR" -force >/dev/null 2>&1 || true
            rmdir "$MOUNT_DIR" >/dev/null 2>&1 || true
            rm -f "$LOG_FILE"
          }
          trap cleanup EXIT

          hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_DIR" -nobrowse -readonly
          APP_IN_DMG="$(find "$MOUNT_DIR" -maxdepth 2 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_IN_DMG" ]; then
            echo "::error::No .app bundle found inside DMG."
            find "$MOUNT_DIR" -maxdepth 3 -print || true
            exit 1
          fi

          APP_EXEC="$(find "$APP_IN_DMG/Contents/MacOS" -maxdepth 1 -type f -perm -111 | head -n 1)"
          if [ -z "$APP_EXEC" ]; then
            echo "::error::No executable found in DMG app bundle."
            find "$APP_IN_DMG/Contents/MacOS" -maxdepth 2 -print || true
            exit 1
          fi

          MNE_INIT_PY="$(find "$APP_IN_DMG/Contents" -type f -path '*/mne/__init__.py' | head -n 1)"
          MNE_INIT_PYI="$(find "$APP_IN_DMG/Contents" -type f -path '*/mne/__init__.pyi' | head -n 1)"
          echo "mne __init__.py in DMG app: ${MNE_INIT_PY:-<not found>}"
          echo "mne __init__.pyi in DMG app: ${MNE_INIT_PYI:-<not found>}"

          echo "Running runtime smoke test with process JSON: $PROCESS_JSON_SRC"
          set +e
          "$APP_EXEC" --f "$PROCESS_JSON_SRC" >"$LOG_FILE" 2>&1
          APP_STATUS=$?
          set -e

          cat "$LOG_FILE" || true
          if [ "$APP_STATUS" -ne 0 ]; then
            echo "::error::Runtime smoke execution exited with status $APP_STATUS"
            exit "$APP_STATUS"
          fi

          if grep -Eqi "ERROR Could not|^ERROR|ModuleNotFoundError|ImportError|Traceback|FileNotFoundError" "$LOG_FILE"; then
            echo "::error::Runtime smoke execution reported errors in logs."
            exit 1
          fi

          if ! grep -q "Process completed." "$LOG_FILE"; then
            echo "::error::Runtime smoke execution did not reach 'Process completed.'"
            exit 1
          fi

      - name: Sign, notarize and staple .dmg
        if: ${{ inputs.sign_macos && !inputs.freeze_only }}
        run: |
          set -eo pipefail
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          DMG_PATH="$(find target -maxdepth 1 -type f -name '*.dmg' ! -name 'rw.*' | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "No final DMG found in target/."
            ls -la target || true
            exit 1
          fi
          echo "DMG_PATH=$DMG_PATH"
          xattr -cr "$DMG_PATH"
          codesign --force --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
            "$DMG_PATH"

          SUBMIT_OUTPUT="$(xcrun notarytool submit "$DMG_PATH" \
            --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
            --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)"

          echo "$SUBMIT_OUTPUT"
          NOTARY_STATUS="$(python -c "import json,sys; print(json.load(sys.stdin).get('status',''))" <<< "$SUBMIT_OUTPUT")"
          SUBMISSION_ID="$(python -c "import json,sys; print(json.load(sys.stdin).get('id',''))" <<< "$SUBMIT_OUTPUT")"

          if [ "$NOTARY_STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $NOTARY_STATUS"
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
                --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi

          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Upload .dmg to Artifacts
        if: ${{ inputs.upload_artifacts && !inputs.freeze_only }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozSetup-x64.dmg
          path: target/*.dmg
          retention-days: 2

      - name: Publish x64 .dmg to Release
        if: ${{ inputs.publish_to_release && !inputs.freeze_only && inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.release_tag }}
          draft: ${{ inputs.release_draft }}
          prerelease: ${{ inputs.release_prerelease }}
          files: target/*.dmg
          fail_on_unmatched_files: true

      - name: Upload target folder for debug
        if: ${{ inputs.freeze_only && inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozTarget-x64
          path: target/**
          retention-days: 2

  build_dmg_arm64:
    if: ${{ inputs.build_macos && inputs.build_macos_arm64 }}
    runs-on: macos-14
    env:
      APPLE_TEAM_ID: UDE82H2SDR
      APP_BUNDLE_ID: com.snooztoolbox
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          repository: ${{ contains(inputs.source_repo, '/') && inputs.source_repo || format('SnoozToolbox/{0}', inputs.source_repo) }}
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.GH_PAT }}

      - name: Patch is_dev for release
        run: |
          sed -i '' 's/is_dev = True/is_dev = False/' src/main/python/config.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10.11'

      - name: Print macOS architecture
        run: |
          echo "runner.os=${{ runner.os }}"
          echo "runner.arch=${{ runner.arch }}"
          echo "target.arch=arm64"
          uname -m
          arch
          sysctl -n machdep.cpu.brand_string


      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

          MAX_ATTEMPTS=5
          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            curl --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 --connect-timeout 20 --max-time 180 \
              -H "Accept: application/octet-stream" \
              -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -o fbs-pro.tar.gz \
              "https://api.github.com/repos/SnoozToolbox/fbs-pro-version/releases/assets/${{ secrets.FBS_ASSET_ID }}" && break

            if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
              echo "Failed to download fbs-pro.tar.gz after $MAX_ATTEMPTS attempts"
              exit 1
            fi

            echo "Retrying fbs-pro download (attempt $ATTEMPT/$MAX_ATTEMPTS)"
            sleep $((ATTEMPT * 3))
          done

          test -s fbs-pro.tar.gz
          pip install fbs-pro.tar.gz

      - name: Configure Apple signing certificate
        if: ${{ inputs.sign_macos }}
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_P12_PASSWORD }}
          APPLE_CI_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          security delete-keychain build.keychain >/dev/null 2>&1 || true
          security delete-keychain "$KEYCHAIN_PATH" >/dev/null 2>&1 || true
          printf '%s' "$APPLE_CERT_P12_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$APPLE_CI_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$APPLE_CI_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERT_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_CI_KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$HOME/Library/Keychains/login.keychain-db" "/Library/Keychains/System.keychain"
          rm -f certificate.p12

      - name: Freeze app with fbs
        run: |
          if [ "${{ inputs.freeze_only }}" = "true" ]; then
            fbs freeze --debug
          else
            fbs freeze
          fi

      - name: Runtime smoke test from frozen app bundle (macOS arm64)
        if: ${{ !inputs.freeze_only && inputs.runtime_smoke_test }}
        run: |
          set -eo pipefail
          PROCESS_JSON_SRC="runtime-smoke/snooz_runtime_smoke.json"
          if [ ! -f "$PROCESS_JSON_SRC" ]; then
            echo "::error::Runtime smoke process JSON not found: $PROCESS_JSON_SRC"
            find . -maxdepth 4 -type f | sort || true
            exit 1
          fi

          EDF_LOCAL_PATH="runtime_smoke_repo/_runtime_data/learn-nsrr01.edf"
          mkdir -p "$(dirname "$EDF_LOCAL_PATH")"
          echo "Downloading runtime smoke EDF to: $EDF_LOCAL_PATH"
          curl --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 \
            --connect-timeout 20 --max-time 600 \
            -o "$EDF_LOCAL_PATH" \
            "https://github.com/SnoozToolbox/snooz-datasets/releases/download/latest/learn-nsrr01.edf"
          test -s "$EDF_LOCAL_PATH"
          echo "Runtime smoke EDF ready at path for JSON: $EDF_LOCAL_PATH"

          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in target/."
            ls -la target || true
            exit 1
          fi

          APP_EXEC="$(find "$APP_PATH/Contents/MacOS" -maxdepth 1 -type f -perm -111 | head -n 1)"
          if [ -z "$APP_EXEC" ]; then
            echo "::error::No executable found in frozen app bundle."
            find "$APP_PATH/Contents/MacOS" -maxdepth 2 -print || true
            exit 1
          fi

          MNE_PKG_SRC="$(python - <<'PY'
          import importlib.util
          import pathlib

          spec = importlib.util.find_spec('mne')
          if spec is None or spec.origin is None:
              raise SystemExit(1)

          print(pathlib.Path(spec.origin).parent)
          PY
          )"
          if [ -z "$MNE_PKG_SRC" ]; then
            echo "::error::Unable to locate mne package in site-packages."
            exit 1
          fi
          APP_PATH="$APP_PATH" MNE_PKG_SRC="$MNE_PKG_SRC" python - <<'PY'
          import os
          import pathlib
          import shutil

          src = pathlib.Path(os.environ['MNE_PKG_SRC'])
          dst = pathlib.Path(os.environ['APP_PATH']) / 'Contents' / 'Frameworks' / 'mne'
          dst.mkdir(parents=True, exist_ok=True)

          count = 0
          for stub in src.rglob('*.pyi'):
              rel = stub.relative_to(src)
              out = dst / rel
              out.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(stub, out)
              count += 1

          if count == 0:
              raise SystemExit('No mne .pyi stubs found to copy')

          print(f'Prepared {count} mne stubs for runtime under {dst}')
          PY

          LOG_FILE="$(mktemp /tmp/snooz-freeze-runtime-smoke.XXXXXX.log)"
          cleanup() {
            rm -f "$LOG_FILE"
          }
          trap cleanup EXIT

          echo "Running runtime smoke test with process JSON: $PROCESS_JSON_SRC"
          set +e
          "$APP_EXEC" --f "$PROCESS_JSON_SRC" >"$LOG_FILE" 2>&1
          APP_STATUS=$?
          set -e

          cat "$LOG_FILE" || true
          if [ "$APP_STATUS" -ne 0 ]; then
            echo "::error::Runtime smoke execution on frozen app exited with status $APP_STATUS"
            exit "$APP_STATUS"
          fi

          if grep -Eqi "ERROR Could not|^ERROR|ModuleNotFoundError|ImportError|Traceback|FileNotFoundError" "$LOG_FILE"; then
            echo "::error::Runtime smoke execution on frozen app reported errors in logs."
            exit 1
          fi

          if ! grep -q "Process completed." "$LOG_FILE"; then
            echo "::error::Runtime smoke execution on frozen app did not reach 'Process completed.'"
            exit 1
          fi

      - name: Copy PSGReader extensions (macOS arm64)
        run: |
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          mkdir -p "$APP_PATH/Contents/Resources/extension/PSGReader"
          cp -r src/main/resources/mac/extension/PSGReader/. "$APP_PATH/Contents/Resources/extension/PSGReader/"
          cp -r src/main/resources/mac/mac-arm64/extension/PSGReader/. "$APP_PATH/Contents/Resources/extension/PSGReader/"

      - name: Runtime completion smoke test app bundle (macOS arm64)
        if: ${{ !inputs.freeze_only && inputs.runtime_smoke_test }}
        run: |
          set -eo pipefail
          PROCESS_JSON_SRC="runtime-smoke/snooz_runtime_smoke.json"
          if [ ! -f "$PROCESS_JSON_SRC" ]; then
            echo "::error::Runtime smoke process JSON not found: $PROCESS_JSON_SRC"
            find . -maxdepth 4 -type f | sort || true
            exit 1
          fi

          EDF_LOCAL_PATH="runtime_smoke_repo/_runtime_data/learn-nsrr01.edf"
          mkdir -p "$(dirname "$EDF_LOCAL_PATH")"
          if [ ! -s "$EDF_LOCAL_PATH" ]; then
            echo "Downloading runtime smoke EDF to: $EDF_LOCAL_PATH"
            curl --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 \
              --connect-timeout 20 --max-time 600 \
              -o "$EDF_LOCAL_PATH" \
              "https://github.com/SnoozToolbox/snooz-datasets/releases/download/latest/learn-nsrr01.edf"
            test -s "$EDF_LOCAL_PATH"
          fi
          echo "Runtime smoke EDF ready at path for JSON: $EDF_LOCAL_PATH"

          APP_PATH="$(find target -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in target/."
            ls -la target || true
            exit 1
          fi

          APP_EXEC="$(find "$APP_PATH/Contents/MacOS" -maxdepth 1 -type f -perm -111 | head -n 1)"
          if [ -z "$APP_EXEC" ]; then
            echo "::error::No executable found inside app bundle."
            find "$APP_PATH/Contents/MacOS" -maxdepth 2 -print || true
            exit 1
          fi

          LOG_FILE="$(mktemp /tmp/snooz-app-runtime-smoke.XXXXXX.log)"
          cleanup() {
            rm -f "$LOG_FILE"
          }
          trap cleanup EXIT

          echo "Running app bundle runtime completion smoke with process JSON: $PROCESS_JSON_SRC"
          set +e
          "$APP_EXEC" --f "$PROCESS_JSON_SRC" >"$LOG_FILE" 2>&1
          APP_STATUS=$?
          set -e

          echo "--- App bundle runtime smoke log (last 200 lines) ---"
          tail -n 200 "$LOG_FILE" || true
          echo "APP_STATUS=$APP_STATUS"

          if [ "$APP_STATUS" -ne 0 ]; then
            echo "::error::App bundle runtime smoke exited with status $APP_STATUS"
            exit "$APP_STATUS"
          fi

          if grep -Eqi "ERROR Could not|^ERROR|ModuleNotFoundError|ImportError|Traceback|FileNotFoundError|Library not loaded|dlopen\\(" "$LOG_FILE"; then
            echo "::error::App bundle runtime smoke reported errors in logs."
            exit 1
          fi

          if ! grep -q "Process completed." "$LOG_FILE"; then
            echo "::error::App bundle runtime smoke did not reach 'Process completed.'"
            exit 1
          fi

          echo "App bundle runtime smoke verdict: PASS_COMPLETED"

      - name: Sign Snooz.app
        if: ${{ inputs.sign_macos && !inputs.freeze_only }}
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          # The app bundle name is stable in this workflow, so use the known path directly.
          APP_PATH="target/Snooz Toolbox.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Expected app bundle not found: $APP_PATH"
            ls -la target || true
            exit 1
          fi
          PLIST_PATH="$APP_PATH/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $APP_BUNDLE_ID" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string $APP_BUNDLE_ID" "$PLIST_PATH"

          # Find the list of files '*.app' to sign and sign them.
          find "$APP_PATH" -mindepth 1 -type d -name '*.app' -print0 | while IFS= read -r -d '' NESTED_APP; do
            codesign --force --options runtime --timestamp \
              --keychain "$KEYCHAIN_PATH" \
              --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
              "$NESTED_APP"
          done

          # Find the list of files '*.py' or '*.pyc' to sign and sign them.
          find "$APP_PATH" -type f -perm -111 ! -name '*.py' ! -name '*.pyc' ! -name '*.pyo' -print0 | while IFS= read -r -d '' BIN; do
            codesign --force --timestamp --options runtime \
              --keychain "$KEYCHAIN_PATH" \
              --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
              "$BIN"
          done

          # Find the list of files '*.so' or '*.dylib' to sign and sign them.
          find "$APP_PATH" -type f \( -name '*.so' -o -name '*.dylib' \) -print0 | while IFS= read -r -d '' BIN; do
            codesign --force --timestamp --options runtime \
              --keychain "$KEYCHAIN_PATH" \
              --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
              "$BIN"
          done

          # Find the list of files '*.pyi' to sign and sign them.
          find "$APP_PATH" -type f -name '*.pyi' -print0 | while IFS= read -r -d '' STUB; do
            codesign --force --timestamp \
              --keychain "$KEYCHAIN_PATH" \
              --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
              "$STUB"
          done

          # Sign explicitly the mne subtree because lazy_loader expects sibling stub files on disk.
          MNE_FRAMEWORKS_DIR="$APP_PATH/Contents/Frameworks/mne"
          if [ -d "$MNE_FRAMEWORKS_DIR" ]; then
            # Sign the mne subtree explicitly because lazy_loader expects sibling stub files on disk.
            echo "Signing and verifying Frameworks/mne Python files"
            find "$MNE_FRAMEWORKS_DIR" -type f \( -name '*.py' -o -name '*.pyi' \) -print0 | while IFS= read -r -d '' MNE_FILE; do
              echo "Signing mne file: $MNE_FILE"
              codesign --force --timestamp \
                --keychain "$KEYCHAIN_PATH" \
                --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
                "$MNE_FILE"
              codesign --verify --verbose=2 "$MNE_FILE"
            done
            codesign --verify --deep --strict --verbose=2 "$MNE_FRAMEWORKS_DIR"
          fi

          # Signature of the main app bundle itself, after all nested signing steps.
          codesign --force --deep --options runtime --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
            "$APP_PATH"
            
          # Final bundle verification after all nested signing steps.
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          if ! spctl -a -t exec -vv "$APP_PATH"; then
            echo "Pre-notarization spctl assessment rejected (expected on some CI hosts)."
          fi

      - name: Audit Frameworks .pyi signature status (macOS arm64)
        if: ${{ inputs.sign_macos && !inputs.freeze_only }}
        run: |
          set -eo pipefail
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          FRAMEWORKS_DIR="$APP_PATH/Contents/Frameworks"
          if [ ! -d "$FRAMEWORKS_DIR" ]; then
            echo "No Frameworks directory found at $FRAMEWORKS_DIR"
            exit 0
          fi

          PYI_COUNT="$(find "$FRAMEWORKS_DIR" -type f -name '*.pyi' | wc -l | tr -d ' ')"
          echo "Frameworks .pyi file count: $PYI_COUNT"
          find "$FRAMEWORKS_DIR" -type f -name '*.pyi' | sort || true

          find "$FRAMEWORKS_DIR" -type f -name '*.pyi' -print0 | while IFS= read -r -d '' STUB; do
            echo "Verifying codesign on $STUB"
            codesign --verify --verbose=2 "$STUB"
          done

      - name: Notarize and staple Snooz.app
        if: ${{ inputs.sign_macos && !inputs.freeze_only }}
        run: |
          set -eo pipefail
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          APP_NAME="$(basename "$APP_PATH")"
          APP_ZIP="target/${APP_NAME}.zip"

          rm -f "$APP_ZIP"
          ditto -c -k --keepParent "$APP_PATH" "$APP_ZIP"

          APP_SUBMIT_OUTPUT="$(xcrun notarytool submit "$APP_ZIP" \
            --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
            --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)"

          echo "$APP_SUBMIT_OUTPUT"
          APP_NOTARY_STATUS="$(python -c "import json,sys; print(json.load(sys.stdin).get('status',''))" <<< "$APP_SUBMIT_OUTPUT")"
          APP_SUBMISSION_ID="$(python -c "import json,sys; print(json.load(sys.stdin).get('id',''))" <<< "$APP_SUBMIT_OUTPUT")"

          if [ "$APP_NOTARY_STATUS" != "Accepted" ]; then
            echo "App notarization failed with status: $APP_NOTARY_STATUS"
            if [ -n "$APP_SUBMISSION_ID" ]; then
              xcrun notarytool log "$APP_SUBMISSION_ID" \
                --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
                --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          rm -f "$APP_ZIP"

      - name: Build .dmg Installer
        if: ${{ !inputs.freeze_only }}
        run: |
          set -eo pipefail
          echo "Building DMG with fbs installer"
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          APP_NAME="$(basename "$APP_PATH")"
          APP_BASE_NAME="${APP_NAME%.app}"
          VOL_PATH="/Volumes/$APP_BASE_NAME"
          FINAL_DMG_PATH="target/${APP_BASE_NAME}.dmg"
          RW_DMG_PATH="target/rw.${APP_BASE_NAME}.dmg"

          cleanup_volume() {
            if mount | grep -q "on $VOL_PATH "; then
              echo "Detaching leftover mounted volume $VOL_PATH"
              hdiutil detach "$VOL_PATH" -force || true
            fi
          }

          cleanup_volume

          MAX_ATTEMPTS=3
          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            rm -f "$FINAL_DMG_PATH" "$RW_DMG_PATH"
            echo "fbs DMG attempt $ATTEMPT/$MAX_ATTEMPTS"

            set +e
            fbs installer
            FBS_STATUS=$?
            set -e

            cleanup_volume

            if [ -f "$FINAL_DMG_PATH" ]; then
              echo "DMG created successfully."
              break
            fi

            if [ -f "$RW_DMG_PATH" ]; then
              echo "Temporary rw DMG found. Attempting to recover final DMG."
              CONVERT_STATUS=1
              CONVERT_MAX_ATTEMPTS=5
              for CONVERT_ATTEMPT in $(seq 1 "$CONVERT_MAX_ATTEMPTS"); do
                rm -f "$FINAL_DMG_PATH"
                set +e
                hdiutil convert "$RW_DMG_PATH" -format UDZO -o "$FINAL_DMG_PATH"
                CONVERT_STATUS=$?
                set -e

                if [ "$CONVERT_STATUS" -eq 0 ] && [ -f "$FINAL_DMG_PATH" ]; then
                  break
                fi

                if [ "$CONVERT_ATTEMPT" -lt "$CONVERT_MAX_ATTEMPTS" ]; then
                  echo "hdiutil convert retry $CONVERT_ATTEMPT/$CONVERT_MAX_ATTEMPTS after transient failure."
                  sleep $((CONVERT_ATTEMPT * 2))
                fi
              done

              if [ "$CONVERT_STATUS" -eq 0 ] && [ -f "$FINAL_DMG_PATH" ]; then
                rm -f "$RW_DMG_PATH" || true
                echo "DMG recovered successfully from temporary image."
                break
              fi
            fi

            if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
              EXIT_CODE="$FBS_STATUS"
              if [ "$EXIT_CODE" -eq 0 ]; then
                EXIT_CODE=1
              fi
              echo "fbs installer failed after $MAX_ATTEMPTS attempts (last exit: $FBS_STATUS)."
              hdiutil info || true
              exit "$EXIT_CODE"
            fi

            echo "Retrying fbs installer after cleanup..."
            sleep 3
          done
          ls -la target/*.dmg

      - name: Verify required packages inside .dmg (macOS arm64)
        if: ${{ !inputs.freeze_only }}
        run: |
          set -eo pipefail
          DMG_PATH="$(find target -maxdepth 1 -type f -name '*.dmg' ! -name 'rw.*' | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "::error::No final DMG found in target/."
            ls -la target || true
            exit 1
          fi

          MOUNT_DIR="$(mktemp -d /tmp/snooz-dmg-check.XXXXXX)"
          cleanup() {
            hdiutil detach "$MOUNT_DIR" -force >/dev/null 2>&1 || true
            rmdir "$MOUNT_DIR" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_DIR" -nobrowse -readonly
          APP_IN_DMG="$(find "$MOUNT_DIR" -maxdepth 2 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_IN_DMG" ]; then
            echo "::error::No .app bundle found inside DMG."
            find "$MOUNT_DIR" -maxdepth 3 -print || true
            exit 1
          fi

          for PKG in mne lazy_loader lspopt yasa; do
            if find "$APP_IN_DMG/Contents" \( -type d -name "$PKG" -o -type f -name "$PKG.py" \) -print -quit | grep -q .; then
              echo "Package found in DMG app bundle: $PKG"
            else
              echo "::warning::Package not found as loose file in DMG app bundle: $PKG (may be embedded in PyInstaller archive)"
            fi
          done

      - name: Smoke test app launch from .dmg (macOS arm64)
        if: ${{ !inputs.freeze_only }}
        run: |
          set -eo pipefail
          DMG_PATH="$(find target -maxdepth 1 -type f -name '*.dmg' ! -name 'rw.*' | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "::error::No final DMG found in target/."
            ls -la target || true
            exit 1
          fi

          MOUNT_DIR="$(mktemp -d /tmp/snooz-dmg-smoke.XXXXXX)"
          LOG_FILE="$(mktemp /tmp/snooz-dmg-smoke.XXXXXX.log)"
          APP_PID=""
          cleanup() {
            if [ -n "$APP_PID" ] && kill -0 "$APP_PID" >/dev/null 2>&1; then
              kill "$APP_PID" >/dev/null 2>&1 || true
              wait "$APP_PID" >/dev/null 2>&1 || true
            fi
            hdiutil detach "$MOUNT_DIR" -force >/dev/null 2>&1 || true
            rmdir "$MOUNT_DIR" >/dev/null 2>&1 || true
            rm -f "$LOG_FILE"
          }
          trap cleanup EXIT

          hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_DIR" -nobrowse -readonly
          APP_IN_DMG="$(find "$MOUNT_DIR" -maxdepth 2 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_IN_DMG" ]; then
            echo "::error::No .app bundle found inside DMG."
            find "$MOUNT_DIR" -maxdepth 3 -print || true
            exit 1
          fi

          APP_EXEC="$(find "$APP_IN_DMG/Contents/MacOS" -maxdepth 1 -type f -perm -111 | head -n 1)"
          if [ -z "$APP_EXEC" ]; then
            echo "::error::No executable found in DMG app bundle."
            find "$APP_IN_DMG/Contents/MacOS" -maxdepth 2 -print || true
            exit 1
          fi
          echo "APP_EXEC=$APP_EXEC"

          "$APP_EXEC" >"$LOG_FILE" 2>&1 &
          APP_PID=$!
          echo "APP_PID=$APP_PID"
          sleep 20

          if ! kill -0 "$APP_PID" >/dev/null 2>&1; then
            set +e
            wait "$APP_PID"
            APP_STATUS=$?
            set -e
            echo "DMG app process exited during smoke window"
            cat "$LOG_FILE" || true
            if [ "$APP_STATUS" -ne 0 ]; then
              echo "::error::DMG app exited during smoke test with status $APP_STATUS"
              exit "$APP_STATUS"
            fi
          else
            echo "DMG app process is still running after smoke window"
          fi

          APP_NAME="$(basename "$APP_IN_DMG" .app)"
          echo "APP_NAME=$APP_NAME"
          GUI_RUNNING="$(osascript -e 'tell application "System Events" to (name of application processes) contains "'"$APP_NAME"'"' 2>/dev/null || true)"
          if [ "$GUI_RUNNING" != "true" ]; then
            echo "::error::DMG app binary is running but no GUI application process was detected for '$APP_NAME'."
            cat "$LOG_FILE" || true

            DIAG_LOG_FILE="$(mktemp /tmp/snooz-dmg-smoke-diag.XXXXXX.log)"
            echo "Collecting foreground launch diagnostics to capture explicit runtime errors..."
            set +e
            "$APP_EXEC" >"$DIAG_LOG_FILE" 2>&1 &
            DIAG_PID=$!
            sleep 25
            if kill -0 "$DIAG_PID" >/dev/null 2>&1; then
              kill "$DIAG_PID" >/dev/null 2>&1 || true
              wait "$DIAG_PID" >/dev/null 2>&1 || true
              DIAG_STATUS=124
            else
              wait "$DIAG_PID"
              DIAG_STATUS=$?
            fi
            set -e

            echo "Foreground diagnostic exit code: $DIAG_STATUS"
            cat "$DIAG_LOG_FILE" || true
            rm -f "$DIAG_LOG_FILE"
            exit 1
          fi

          WINDOW_COUNT="$(osascript -e 'tell application "System Events" to count windows of application process "'"$APP_NAME"'"' 2>/dev/null || true)"
          case "$WINDOW_COUNT" in
            ''|*[!0-9]*)
              echo "::error::Unable to confirm visible windows for '$APP_NAME' (raw result: $WINDOW_COUNT)."
              cat "$LOG_FILE" || true
              exit 1
              ;;
          esac
          if [ "$WINDOW_COUNT" -lt 1 ]; then
            echo "::error::DMG app launched but no visible window appeared for '$APP_NAME'."
            cat "$LOG_FILE" || true
            exit 1
          fi
          echo "Detected visible window count: $WINDOW_COUNT"

          if grep -Eqi "ModuleNotFoundError|ImportError|Traceback|Library not loaded|dlopen\\(" "$LOG_FILE"; then
            cat "$LOG_FILE" || true
            echo "::error::DMG app launch log contains import or dynamic library errors."
            exit 1
          fi

      - name: Runtime smoke test from .dmg (macOS arm64)
        if: ${{ !inputs.freeze_only && inputs.runtime_smoke_test }}
        run: |
          set -eo pipefail
          PROCESS_JSON_SRC="runtime-smoke/snooz_runtime_smoke.json"
          if [ ! -f "$PROCESS_JSON_SRC" ]; then
            echo "::error::Runtime smoke process JSON not found: $PROCESS_JSON_SRC"
            find . -maxdepth 4 -type f | sort || true
            exit 1
          fi

          EDF_LOCAL_PATH="runtime_smoke_repo/_runtime_data/learn-nsrr01.edf"
          mkdir -p "$(dirname "$EDF_LOCAL_PATH")"
          echo "Downloading runtime smoke EDF to: $EDF_LOCAL_PATH"
          curl --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 \
            --connect-timeout 20 --max-time 600 \
            -o "$EDF_LOCAL_PATH" \
            "https://github.com/SnoozToolbox/snooz-datasets/releases/download/latest/learn-nsrr01.edf"
          test -s "$EDF_LOCAL_PATH"
          echo "Runtime smoke EDF ready at path for JSON: $EDF_LOCAL_PATH"

          DMG_PATH="$(find target -maxdepth 1 -type f -name '*.dmg' ! -name 'rw.*' | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "::error::No final DMG found in target/."
            ls -la target || true
            exit 1
          fi

          MOUNT_DIR="$(mktemp -d /tmp/snooz-dmg-runtime-smoke.XXXXXX)"
          LOG_FILE="$(mktemp /tmp/snooz-dmg-runtime-smoke.XXXXXX.log)"
          cleanup() {
            hdiutil detach "$MOUNT_DIR" -force >/dev/null 2>&1 || true
            rmdir "$MOUNT_DIR" >/dev/null 2>&1 || true
            rm -f "$LOG_FILE"
          }
          trap cleanup EXIT

          hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_DIR" -nobrowse -readonly
          APP_IN_DMG="$(find "$MOUNT_DIR" -maxdepth 2 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_IN_DMG" ]; then
            echo "::error::No .app bundle found inside DMG."
            find "$MOUNT_DIR" -maxdepth 3 -print || true
            exit 1
          fi

          APP_EXEC="$(find "$APP_IN_DMG/Contents/MacOS" -maxdepth 1 -type f -perm -111 | head -n 1)"
          if [ -z "$APP_EXEC" ]; then
            echo "::error::No executable found in DMG app bundle."
            find "$APP_IN_DMG/Contents/MacOS" -maxdepth 2 -print || true
            exit 1
          fi

          MNE_INIT_PY="$(find "$APP_IN_DMG/Contents" -type f -path '*/mne/__init__.py' | head -n 1)"
          MNE_INIT_PYI="$(find "$APP_IN_DMG/Contents" -type f -path '*/mne/__init__.pyi' | head -n 1)"
          echo "mne __init__.py in DMG app: ${MNE_INIT_PY:-<not found>}"
          echo "mne __init__.pyi in DMG app: ${MNE_INIT_PYI:-<not found>}"

          echo "Running runtime smoke test with process JSON: $PROCESS_JSON_SRC"
          set +e
          "$APP_EXEC" --f "$PROCESS_JSON_SRC" >"$LOG_FILE" 2>&1
          APP_STATUS=$?
          set -e

          cat "$LOG_FILE" || true
          if [ "$APP_STATUS" -ne 0 ]; then
            echo "::error::Runtime smoke execution exited with status $APP_STATUS"
            exit "$APP_STATUS"
          fi

          if grep -Eqi "ERROR Could not|^ERROR|ModuleNotFoundError|ImportError|Traceback|FileNotFoundError" "$LOG_FILE"; then
            echo "::error::Runtime smoke execution reported errors in logs."
            exit 1
          fi

          if ! grep -q "Process completed." "$LOG_FILE"; then
            echo "::error::Runtime smoke execution did not reach 'Process completed.'"
            exit 1
          fi

      - name: Sign, notarize and staple .dmg
        if: ${{ inputs.sign_macos && !inputs.freeze_only }}
        run: |
          set -eo pipefail
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          DMG_PATH="$(find target -maxdepth 1 -type f -name '*.dmg' ! -name 'rw.*' | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "No final DMG found in target/."
            ls -la target || true
            exit 1
          fi
          echo "DMG_PATH=$DMG_PATH"
          xattr -cr "$DMG_PATH"
          codesign --force --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
            "$DMG_PATH"

          SUBMIT_OUTPUT="$(xcrun notarytool submit "$DMG_PATH" \
            --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
            --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)"

          echo "$SUBMIT_OUTPUT"
          NOTARY_STATUS="$(python -c "import json,sys; print(json.load(sys.stdin).get('status',''))" <<< "$SUBMIT_OUTPUT")"
          SUBMISSION_ID="$(python -c "import json,sys; print(json.load(sys.stdin).get('id',''))" <<< "$SUBMIT_OUTPUT")"

          if [ "$NOTARY_STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $NOTARY_STATUS"
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
                --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi

          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Upload .dmg to Artifacts
        if: ${{ inputs.upload_artifacts && !inputs.freeze_only }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozSetup-arm64.dmg
          path: target/*.dmg
          retention-days: 2

      - name: Publish arm64 .dmg to Release
        if: ${{ inputs.publish_to_release && !inputs.freeze_only && inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.release_tag }}
          draft: ${{ inputs.release_draft }}
          prerelease: ${{ inputs.release_prerelease }}
          files: target/*.dmg
          fail_on_unmatched_files: true

      - name: Upload target folder for debug
        if: ${{ inputs.freeze_only && inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozTarget-arm64
          path: target/**
          retention-days: 2

