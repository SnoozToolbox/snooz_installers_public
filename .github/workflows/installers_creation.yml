name: Build binaries

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Build Windows installer'
        required: true
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS installer'
        required: true
        type: boolean
        default: true
      build_macos_intel:
        description: 'Build macOS Intel (x64) installer'
        required: true
        type: boolean
        default: true
      build_macos_arm64:
        description: 'Build macOS Apple Silicon (arm64) installer'
        required: true
        type: boolean
        default: true
      freeze_only:
        description: 'macOS debug mode: freeze only and upload target folder'
        required: true
        type: boolean
        default: false
      copy_missing_packages_macos:
        description: 'Copy missing Python packages into macOS app bundle'
        required: true
        type: boolean
        default: false
      verify_hooks_macos:
        description: 'Fail early if PyInstaller hooks did not include required macOS packages'
        required: true
        type: boolean
        default: true
      sign_macos:
        description: 'Sign and notarize macOS artifacts'
        required: true
        type: boolean
        default: true
      build_linux:
        description: 'Build Linux installer (zip)'
        required: true
        type: boolean
        default: true
      source_repo:
        description: 'Source repository (owner/name or repo only; owner defaults to SnoozToolbox)'
        required: true
        default: 'SnoozToolbox/snooz-toolbox'
      source_ref:
        description: 'Branch, tag, or commit SHA from source_repo'
        required: true
        default: 'main'
      upload_artifacts:
        description: 'Upload installers as workflow artifacts'
        required: true
        type: boolean
        default: false
      publish_to_release:
        description: 'Upload macOS DMG files to a GitHub Release'
        required: true
        type: boolean
        default: false
      release_tag:
        description: 'Release tag (required when publish_to_release is true)'
        required: false
        default: ''
      release_name:
        description: 'Release name (optional)'
        required: false
        default: ''
      release_draft:
        description: 'Create/update release as draft'
        required: true
        type: boolean
        default: true
      release_prerelease:
        description: 'Mark release as prerelease'
        required: true
        type: boolean
        default: true

jobs:
  build_exe:
    runs-on: windows-2022
    if: ${{ inputs.build_windows }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          repository: ${{ contains(inputs.source_repo, '/') && inputs.source_repo || format('SnoozToolbox/{0}', inputs.source_repo) }}
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.GH_PAT }}

      - name: Patch is_dev for release
        shell: pwsh
        run: |
          $file = "src/main/python/config.py"
          (Get-Content $file) -replace 'is_dev = True', 'is_dev = False' | Set-Content $file

      - name: Set Up python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install fbs pro
        run: |
          $maxAttempts = 5
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            curl --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 --connect-timeout 20 --max-time 180 `
                 -H "Accept: application/octet-stream" `
                 -H "Authorization: Bearer ${{ secrets.GH_PAT }}" `
                 -H "X-GitHub-Api-Version: 2022-11-28" `
                 -o fbs-pro.tar.gz `
                 "https://api.github.com/repos/SnoozToolbox/fbs-pro-version/releases/assets/${{ secrets.FBS_ASSET_ID }}"

            if ($LASTEXITCODE -eq 0 -and (Test-Path "fbs-pro.tar.gz") -and ((Get-Item "fbs-pro.tar.gz").Length -gt 0)) {
              break
            }

            if ($attempt -eq $maxAttempts) {
              throw "Failed to download fbs-pro.tar.gz after $maxAttempts attempts"
            }

            Write-Host "Retrying fbs-pro download (attempt $attempt/$maxAttempts)"
            Start-Sleep -Seconds (3 * $attempt)
          }

          # Install only if it's valid
          pip install fbs-pro.tar.gz

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          choco install vcredist2010 -y
          choco install vcredist2012 -y

      - name: Verify makensis is available
        shell: pwsh
        run: |
          $nsisPath = "C:\Program Files (x86)\NSIS"
          $makensisExe = Join-Path $nsisPath "makensis.exe"
          if (-not (Test-Path $makensisExe)) {
            throw "makensis.exe not found at expected path: $makensisExe"
          }
          $nsisPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & $makensisExe /VERSION

      - name: Freeze app with fbs
        run: |
          if [ "${{ inputs.freeze_only }}" = "true" ]; then
            fbs freeze --debug
          else
            fbs freeze
          fi

      - name: Copy missing packages (Windows)
        shell: pwsh
        run: |
          python -c "import shutil, sysconfig; from pathlib import Path; site=Path(sysconfig.get_paths()['purelib']); dest=Path('target/Snooz/_internal'); dest.mkdir(parents=True, exist_ok=True); pkgs=('mne','lazy_loader','lspopt','yasa'); [shutil.rmtree(dest/p, ignore_errors=True) or shutil.copytree(site/p, dest/p, dirs_exist_ok=True) for p in pkgs]"

      - name: Build installer with fbs
        run: |
          fbs installer # Generates Test_AppSetup.exe

      - name: Upload Installer to Artifacts
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozSetup.exe
          path: target/*.exe
          retention-days: 2

  build_dmg_intel:
    if: ${{ inputs.build_macos && inputs.build_macos_intel }}
    runs-on: [self-hosted, macOS, X64]
    env:
      APPLE_TEAM_ID: UDE82H2SDR
      APP_BUNDLE_ID: com.snooztoolbox
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          repository: ${{ contains(inputs.source_repo, '/') && inputs.source_repo || format('SnoozToolbox/{0}', inputs.source_repo) }}
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.GH_PAT }}

      - name: Patch is_dev for release
        run: |
          sed -i '' 's/is_dev = True/is_dev = False/' src/main/python/config.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10.11'

      - name: Print macOS architecture
        run: |
          echo "runner.os=${{ runner.os }}"
          echo "runner.arch=${{ runner.arch }}"
          echo "target.arch=x64"
          uname -m
          arch
          sysctl -n machdep.cpu.brand_string

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

          MAX_ATTEMPTS=5
          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            curl --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 --connect-timeout 20 --max-time 180 \
              -H "Accept: application/octet-stream" \
              -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -o fbs-pro.tar.gz \
              "https://api.github.com/repos/SnoozToolbox/fbs-pro-version/releases/assets/${{ secrets.FBS_ASSET_ID }}" && break

            if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
              echo "Failed to download fbs-pro.tar.gz after $MAX_ATTEMPTS attempts"
              exit 1
            fi

            echo "Retrying fbs-pro download (attempt $ATTEMPT/$MAX_ATTEMPTS)"
            sleep $((ATTEMPT * 3))
          done

          test -s fbs-pro.tar.gz
          pip install fbs-pro.tar.gz

      - name: Print active source revision and mne hook (macOS x64)
        if: ${{ inputs.verify_hooks_macos }}
        run: |
          echo "source_repo=${{ inputs.source_repo }}"
          echo "source_ref=${{ inputs.source_ref }}"
          git rev-parse HEAD
          if [ -f src/hooks/hook-mne.py ]; then
            echo "Active hook file: src/hooks/hook-mne.py"
            sed -n '1,200p' src/hooks/hook-mne.py
          else
            echo "::warning::src/hooks/hook-mne.py not found in checked out source."
          fi
          python - <<'PY'
          import importlib.util
          import pathlib
          import sys

          print("python:", sys.version)
          try:
              import PyInstaller  # type: ignore
              print("pyinstaller:", PyInstaller.__version__)
          except Exception as exc:
              print("pyinstaller: unavailable", repr(exc))

          spec = importlib.util.find_spec("mne")
          if spec is None or spec.origin is None:
              print("::error::mne package not found after dependency install.")
              raise SystemExit(1)

          pkg_dir = pathlib.Path(spec.origin).parent
          init_py = pkg_dir / "__init__.py"
          init_pyi = pkg_dir / "__init__.pyi"
          print("mne package dir:", pkg_dir)
          print("mne __init__.py exists:", init_py.exists(), init_py)
          print("mne __init__.pyi exists:", init_pyi.exists(), init_pyi)
          if not init_pyi.exists():
              print("::error::mne/__init__.pyi is missing in site-packages before freeze.")
              raise SystemExit(1)
          PY

      - name: Configure Apple signing certificate
        if: ${{ inputs.sign_macos }}
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_P12_PASSWORD }}
          APPLE_CI_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          security delete-keychain build.keychain >/dev/null 2>&1 || true
          security delete-keychain "$KEYCHAIN_PATH" >/dev/null 2>&1 || true
          printf '%s' "$APPLE_CERT_P12_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$APPLE_CI_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$APPLE_CI_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERT_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_CI_KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$HOME/Library/Keychains/login.keychain-db" "/Library/Keychains/System.keychain"
          rm -f certificate.p12

      - name: Freeze app with fbs
        run: |
          fbs freeze

      - name: Ensure required mne stub exists in app bundle (macOS x64)
        run: |
          set -eo pipefail
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in target/."
            ls -la target || true
            exit 1
          fi

          MNE_STUB_SRC="$(python - <<'PY'
          import importlib.util
          import pathlib

          spec = importlib.util.find_spec('mne')
          if spec is None or spec.origin is None:
              raise SystemExit(1)

          stub = pathlib.Path(spec.origin).parent / '__init__.pyi'
          if not stub.exists():
              raise SystemExit(1)

          print(stub)
          PY
          )"

          if [ -z "$MNE_STUB_SRC" ]; then
            echo "::error::Unable to locate mne/__init__.pyi in site-packages."
            exit 1
          fi

          mkdir -p "$APP_PATH/Contents/Resources/mne"
          cp "$MNE_STUB_SRC" "$APP_PATH/Contents/Resources/mne/__init__.pyi"
          echo "Copied required stub: $MNE_STUB_SRC -> $APP_PATH/Contents/Resources/mne/__init__.pyi"

      - name: Copy PSGReader extensions (macOS x64)
        run: |
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          mkdir -p "$APP_PATH/Contents/Resources/extension/PSGReader"
          cp -r src/main/resources/mac/extension/PSGReader/. "$APP_PATH/Contents/Resources/extension/PSGReader/"
          cp -r src/main/resources/mac/mac-X64/extension/PSGReader/. "$APP_PATH/Contents/Resources/extension/PSGReader/"

      - name: Copy missing packages (macOS)
        if: ${{ inputs.copy_missing_packages_macos }}
        run: |
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          APP_PATH="$APP_PATH" python -c "import os, shutil, sysconfig; from pathlib import Path; site=Path(sysconfig.get_paths()['purelib']); dest=Path(os.environ['APP_PATH'])/'Contents'/'Resources'; dest.mkdir(parents=True, exist_ok=True); pkgs=('mne','lazy_loader','lspopt','yasa'); [shutil.rmtree(dest/p, ignore_errors=True) or shutil.copytree(site/p, dest/p, dirs_exist_ok=True) for p in pkgs]"

      - name: Verify PyInstaller hook outputs (macOS)
        if: ${{ inputs.verify_hooks_macos }}
        run: |
          ANALYSIS_TOC="$(find target -type f -name 'Analysis-00.toc' | head -n 1)"
          if [ -z "$ANALYSIS_TOC" ]; then
            echo "::error::Analysis-00.toc not found. Unable to validate hook packaging output."
            exit 1
          fi
          echo "Using analysis file: $ANALYSIS_TOC"

          WARN_FILE="$(find "$(dirname "$ANALYSIS_TOC")" -maxdepth 1 -type f -name 'warn-*.txt' | head -n 1)"
          if [ -n "$WARN_FILE" ]; then
            echo "Using warning file: $WARN_FILE"
          else
            echo "No warn-*.txt file found next to Analysis-00.toc"
          fi

          MISSING=()
          for PKG in mne lazy_loader lspopt yasa; do
            if grep -qi "'$PKG'" "$ANALYSIS_TOC"; then
              echo "Package appears in analysis: $PKG"
            else
              echo "Package missing from analysis: $PKG"
              MISSING+=("$PKG")
            fi

            if [ -n "$WARN_FILE" ] && grep -Eqi "missing module named .*${PKG}|No module named .*${PKG}" "$WARN_FILE"; then
              echo "::warning::Potential unresolved module mention for $PKG in $WARN_FILE"
            fi
          done

          if [ "${#MISSING[@]}" -gt 0 ]; then
            UNIQUE_MISSING="$(printf '%s\n' "${MISSING[@]}" | sort -u | tr '\n' ' ')"
            echo "::error::Hook validation failed for required packages: $UNIQUE_MISSING"
            echo "Inspect hook files in src/hooks and PyInstaller analysis outputs before signing/notarization."
            exit 1
          fi

      - name: Verify required packages inside app bundle (macOS x64)
        run: |
          set -eo pipefail
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in target/."
            ls -la target || true
            exit 1
          fi

          for PKG in mne lazy_loader lspopt yasa; do
            if find "$APP_PATH/Contents" \( -type d -name "$PKG" -o -type f -name "$PKG.py" \) -print -quit | grep -q .; then
              echo "Package found in app bundle: $PKG"
            else
              echo "::warning::Package not found as loose file in app bundle: $PKG (may be embedded in PyInstaller archive)"
            fi
          done

      - name: Verify required stubs inside app bundle (macOS x64)
        run: |
          set -eo pipefail
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in target/."
            ls -la target || true
            exit 1
          fi

          MNE_INIT="$(find "$APP_PATH/Contents" -type f -path '*/mne/__init__.py' | head -n 1)"
          if [ -n "$MNE_INIT" ]; then
            echo "mne __init__.py location: $MNE_INIT"
            echo "Expected sibling stub: ${MNE_INIT%__init__.py}__init__.pyi"
          else
            echo "mne __init__.py not found as loose file under app bundle (may be in PYZ archive)."
          fi

          REQUIRED_STUB="$(find "$APP_PATH/Contents" -type f -path '*/mne/__init__.pyi' | head -n 1)"
          if [ -z "$REQUIRED_STUB" ]; then
            echo "::error::Required stub file missing from app bundle: mne/__init__.pyi"
            ANALYSIS_TOC="$(find target -type f -name 'Analysis-00.toc' | head -n 1)"
            if [ -n "$ANALYSIS_TOC" ]; then
              echo "Relevant Analysis-00.toc entries (mne/__init__.py and mne/__init__.pyi):"
              grep -E "mne[/\\]__init__\.py(i)?" "$ANALYSIS_TOC" || true
            fi
            find "$APP_PATH/Contents" -type f -name '*.pyi' | sort || true
            exit 1
          fi
          echo "Found required stub: $REQUIRED_STUB"

      - name: Smoke test app bundle launch (macOS x64)
        run: |
          set -eo pipefail
          echo "PWD=$(pwd)"
          ls -la || true
          ls -la target || true
          find target -maxdepth 4 -type d -name '*.app' -print || true

          APP_PATH="$(find target -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in target/."
            ls -la target || true
            exit 1
          fi
          echo "APP_PATH=$APP_PATH"

          APP_EXEC="$(find "$APP_PATH/Contents/MacOS" -maxdepth 1 -type f -perm -111 | head -n 1)"
          if [ -z "$APP_EXEC" ]; then
            echo "::error::No executable found inside app bundle."
            find "$APP_PATH/Contents/MacOS" -maxdepth 2 -print || true
            exit 1
          fi
          echo "APP_EXEC=$APP_EXEC"

          LOG_FILE="$(mktemp /tmp/snooz-app-smoke.XXXXXX.log)"
          APP_PID=""
          cleanup() {
            if [ -n "$APP_PID" ] && kill -0 "$APP_PID" >/dev/null 2>&1; then
              kill "$APP_PID" >/dev/null 2>&1 || true
              wait "$APP_PID" >/dev/null 2>&1 || true
            fi
            rm -f "$LOG_FILE"
          }
          trap cleanup EXIT

          echo "Launching app executable for smoke test"
          "$APP_EXEC" >"$LOG_FILE" 2>&1 &
          APP_PID=$!
          echo "APP_PID=$APP_PID"
          sleep 20

          if ! kill -0 "$APP_PID" >/dev/null 2>&1; then
            set +e
            wait "$APP_PID"
            APP_STATUS=$?
            set -e
            echo "App process exited during smoke window"
            cat "$LOG_FILE" || true
            if [ "$APP_STATUS" -ne 0 ]; then
              echo "::error::App exited during smoke test with status $APP_STATUS"
              exit "$APP_STATUS"
            fi
          else
            echo "App process is still running after smoke window"
          fi

          if grep -Eqi "ModuleNotFoundError|ImportError|Traceback|Library not loaded|dlopen\\(" "$LOG_FILE"; then
            cat "$LOG_FILE" || true
            echo "::error::App launch log contains import or dynamic library errors."
            exit 1
          fi

      - name: Sign Snooz.app
        if: ${{ inputs.sign_macos && !inputs.freeze_only }}
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          PLIST_PATH="$APP_PATH/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $APP_BUNDLE_ID" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string $APP_BUNDLE_ID" "$PLIST_PATH"

          find "$APP_PATH" -mindepth 1 -type d -name '*.app' -print0 | while IFS= read -r -d '' NESTED_APP; do
            codesign --force --options runtime --timestamp \
              --keychain "$KEYCHAIN_PATH" \
              --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
              "$NESTED_APP"
          done

          find "$APP_PATH" -type f -perm -111 ! -name '*.py' ! -name '*.pyc' ! -name '*.pyo' -print0 | while IFS= read -r -d '' BIN; do
            codesign --force --timestamp --options runtime \
              --keychain "$KEYCHAIN_PATH" \
              --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
              "$BIN"
          done

          find "$APP_PATH" -type f \( -name '*.so' -o -name '*.dylib' \) -print0 | while IFS= read -r -d '' BIN; do
            codesign --force --timestamp --options runtime \
              --keychain "$KEYCHAIN_PATH" \
              --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
              "$BIN"
          done

          find "$APP_PATH" -type f -name '*.pyi' -print0 | while IFS= read -r -d '' STUB; do
            codesign --force --timestamp \
              --keychain "$KEYCHAIN_PATH" \
              --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
              "$STUB"
          done

          codesign --force --options runtime --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
            "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          if ! spctl -a -t exec -vv "$APP_PATH"; then
            echo "Pre-notarization spctl assessment rejected (expected on some CI hosts)."
          fi

      - name: Notarize and staple Snooz.app
        if: ${{ inputs.sign_macos && !inputs.freeze_only }}
        run: |
          set -eo pipefail
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          APP_NAME="$(basename "$APP_PATH")"
          APP_ZIP="target/${APP_NAME}.zip"

          rm -f "$APP_ZIP"
          ditto -c -k --keepParent "$APP_PATH" "$APP_ZIP"

          APP_SUBMIT_OUTPUT="$(xcrun notarytool submit "$APP_ZIP" \
            --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
            --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)"

          echo "$APP_SUBMIT_OUTPUT"
          APP_NOTARY_STATUS="$(python -c "import json,sys; print(json.load(sys.stdin).get('status',''))" <<< "$APP_SUBMIT_OUTPUT")"
          APP_SUBMISSION_ID="$(python -c "import json,sys; print(json.load(sys.stdin).get('id',''))" <<< "$APP_SUBMIT_OUTPUT")"

          if [ "$APP_NOTARY_STATUS" != "Accepted" ]; then
            echo "App notarization failed with status: $APP_NOTARY_STATUS"
            if [ -n "$APP_SUBMISSION_ID" ]; then
              xcrun notarytool log "$APP_SUBMISSION_ID" \
                --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
                --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          rm -f "$APP_ZIP"

      - name: Build .dmg Installer
        if: ${{ !inputs.freeze_only }}
        run: |
          set -eo pipefail
          echo "Building DMG with fbs installer"
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          APP_NAME="$(basename "$APP_PATH")"
          APP_BASE_NAME="${APP_NAME%.app}"
          VOL_PATH="/Volumes/$APP_BASE_NAME"
          FINAL_DMG_PATH="target/${APP_BASE_NAME}.dmg"
          RW_DMG_PATH="target/rw.${APP_BASE_NAME}.dmg"

          cleanup_volume() {
            if mount | grep -q "on $VOL_PATH "; then
              echo "Detaching leftover mounted volume $VOL_PATH"
              hdiutil detach "$VOL_PATH" -force || true
            fi
          }

          cleanup_volume

          MAX_ATTEMPTS=3
          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            rm -f "$FINAL_DMG_PATH" "$RW_DMG_PATH"
            echo "fbs DMG attempt $ATTEMPT/$MAX_ATTEMPTS"

            set +e
            fbs installer
            FBS_STATUS=$?
            set -e

            cleanup_volume

            if [ -f "$FINAL_DMG_PATH" ]; then
              echo "DMG created successfully."
              break
            fi

            if [ -f "$RW_DMG_PATH" ]; then
              echo "Temporary rw DMG found. Attempting to recover final DMG."
              CONVERT_STATUS=1
              CONVERT_MAX_ATTEMPTS=5
              for CONVERT_ATTEMPT in $(seq 1 "$CONVERT_MAX_ATTEMPTS"); do
                rm -f "$FINAL_DMG_PATH"
                set +e
                hdiutil convert "$RW_DMG_PATH" -format UDZO -o "$FINAL_DMG_PATH"
                CONVERT_STATUS=$?
                set -e

                if [ "$CONVERT_STATUS" -eq 0 ] && [ -f "$FINAL_DMG_PATH" ]; then
                  break
                fi

                if [ "$CONVERT_ATTEMPT" -lt "$CONVERT_MAX_ATTEMPTS" ]; then
                  echo "hdiutil convert retry $CONVERT_ATTEMPT/$CONVERT_MAX_ATTEMPTS after transient failure."
                  sleep $((CONVERT_ATTEMPT * 2))
                fi
              done

              if [ "$CONVERT_STATUS" -eq 0 ] && [ -f "$FINAL_DMG_PATH" ]; then
                rm -f "$RW_DMG_PATH" || true
                echo "DMG recovered successfully from temporary image."
                break
              fi
            fi

            if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
              EXIT_CODE="$FBS_STATUS"
              if [ "$EXIT_CODE" -eq 0 ]; then
                EXIT_CODE=1
              fi
              echo "fbs installer failed after $MAX_ATTEMPTS attempts (last exit: $FBS_STATUS)."
              hdiutil info || true
              exit "$EXIT_CODE"
            fi

            echo "Retrying fbs installer after cleanup..."
            sleep 3
          done
          ls -la target/*.dmg

      - name: Verify required packages inside .dmg (macOS x64)
        if: ${{ !inputs.freeze_only }}
        run: |
          set -eo pipefail
          DMG_PATH="$(find target -maxdepth 1 -type f -name '*.dmg' ! -name 'rw.*' | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "::error::No final DMG found in target/."
            ls -la target || true
            exit 1
          fi

          MOUNT_DIR="$(mktemp -d /tmp/snooz-dmg-check.XXXXXX)"
          cleanup() {
            hdiutil detach "$MOUNT_DIR" -force >/dev/null 2>&1 || true
            rmdir "$MOUNT_DIR" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_DIR" -nobrowse -readonly
          APP_IN_DMG="$(find "$MOUNT_DIR" -maxdepth 2 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_IN_DMG" ]; then
            echo "::error::No .app bundle found inside DMG."
            find "$MOUNT_DIR" -maxdepth 3 -print || true
            exit 1
          fi

          for PKG in mne lazy_loader lspopt yasa; do
            if find "$APP_IN_DMG/Contents" \( -type d -name "$PKG" -o -type f -name "$PKG.py" \) -print -quit | grep -q .; then
              echo "Package found in DMG app bundle: $PKG"
            else
              echo "::warning::Package not found as loose file in DMG app bundle: $PKG (may be embedded in PyInstaller archive)"
            fi
          done

      - name: Verify required stubs inside .dmg (macOS x64)
        if: ${{ !inputs.freeze_only }}
        run: |
          set -eo pipefail
          DMG_PATH="$(find target -maxdepth 1 -type f -name '*.dmg' ! -name 'rw.*' | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "::error::No final DMG found in target/."
            ls -la target || true
            exit 1
          fi

          MOUNT_DIR="$(mktemp -d /tmp/snooz-dmg-stub-check.XXXXXX)"
          cleanup() {
            hdiutil detach "$MOUNT_DIR" -force >/dev/null 2>&1 || true
            rmdir "$MOUNT_DIR" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_DIR" -nobrowse -readonly
          APP_IN_DMG="$(find "$MOUNT_DIR" -maxdepth 2 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_IN_DMG" ]; then
            echo "::error::No .app bundle found inside DMG."
            find "$MOUNT_DIR" -maxdepth 3 -print || true
            exit 1
          fi

          MNE_INIT="$(find "$APP_IN_DMG/Contents" -type f -path '*/mne/__init__.py' | head -n 1)"
          if [ -n "$MNE_INIT" ]; then
            echo "mne __init__.py location in DMG app: $MNE_INIT"
            echo "Expected sibling stub in DMG app: ${MNE_INIT%__init__.py}__init__.pyi"
          else
            echo "mne __init__.py not found as loose file in DMG app bundle (may be in PYZ archive)."
          fi

          REQUIRED_STUB="$(find "$APP_IN_DMG/Contents" -type f -path '*/mne/__init__.pyi' | head -n 1)"
          if [ -z "$REQUIRED_STUB" ]; then
            echo "::error::Required stub file missing from DMG app bundle: mne/__init__.pyi"
            find "$APP_IN_DMG/Contents" -type f -name '*.pyi' | sort || true
            exit 1
          fi
          echo "Found required stub: $REQUIRED_STUB"

      - name: Smoke test app launch from .dmg (macOS x64)
        if: ${{ !inputs.freeze_only }}
        run: |
          set -eo pipefail
          DMG_PATH="$(find target -maxdepth 1 -type f -name '*.dmg' ! -name 'rw.*' | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "::error::No final DMG found in target/."
            ls -la target || true
            exit 1
          fi

          MOUNT_DIR="$(mktemp -d /tmp/snooz-dmg-smoke.XXXXXX)"
          LOG_FILE="$(mktemp /tmp/snooz-dmg-smoke.XXXXXX.log)"
          APP_PID=""
          cleanup() {
            if [ -n "$APP_PID" ] && kill -0 "$APP_PID" >/dev/null 2>&1; then
              kill "$APP_PID" >/dev/null 2>&1 || true
              wait "$APP_PID" >/dev/null 2>&1 || true
            fi
            hdiutil detach "$MOUNT_DIR" -force >/dev/null 2>&1 || true
            rmdir "$MOUNT_DIR" >/dev/null 2>&1 || true
            rm -f "$LOG_FILE"
          }
          trap cleanup EXIT

          hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_DIR" -nobrowse -readonly
          APP_IN_DMG="$(find "$MOUNT_DIR" -maxdepth 2 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_IN_DMG" ]; then
            echo "::error::No .app bundle found inside DMG."
            find "$MOUNT_DIR" -maxdepth 3 -print || true
            exit 1
          fi

          APP_EXEC="$(find "$APP_IN_DMG/Contents/MacOS" -maxdepth 1 -type f -perm -111 | head -n 1)"
          if [ -z "$APP_EXEC" ]; then
            echo "::error::No executable found in DMG app bundle."
            find "$APP_IN_DMG/Contents/MacOS" -maxdepth 2 -print || true
            exit 1
          fi
          echo "APP_EXEC=$APP_EXEC"

          "$APP_EXEC" >"$LOG_FILE" 2>&1 &
          APP_PID=$!
          echo "APP_PID=$APP_PID"
          sleep 20

          if ! kill -0 "$APP_PID" >/dev/null 2>&1; then
            set +e
            wait "$APP_PID"
            APP_STATUS=$?
            set -e
            echo "DMG app process exited during smoke window"
            cat "$LOG_FILE" || true
            if [ "$APP_STATUS" -ne 0 ]; then
              echo "::error::DMG app exited during smoke test with status $APP_STATUS"
              exit "$APP_STATUS"
            fi
          else
            echo "DMG app process is still running after smoke window"
          fi

          if grep -Eqi "ModuleNotFoundError|ImportError|Traceback|Library not loaded|dlopen\\(" "$LOG_FILE"; then
            cat "$LOG_FILE" || true
            echo "::error::DMG app launch log contains import or dynamic library errors."
            exit 1
          fi

      - name: Sign, notarize and staple .dmg
        if: ${{ inputs.sign_macos && !inputs.freeze_only }}
        run: |
          set -eo pipefail
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          DMG_PATH="$(find target -maxdepth 1 -type f -name '*.dmg' ! -name 'rw.*' | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "No final DMG found in target/."
            ls -la target || true
            exit 1
          fi
          echo "DMG_PATH=$DMG_PATH"
          xattr -cr "$DMG_PATH"
          codesign --force --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
            "$DMG_PATH"

          SUBMIT_OUTPUT="$(xcrun notarytool submit "$DMG_PATH" \
            --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
            --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)"

          echo "$SUBMIT_OUTPUT"
          NOTARY_STATUS="$(python -c "import json,sys; print(json.load(sys.stdin).get('status',''))" <<< "$SUBMIT_OUTPUT")"
          SUBMISSION_ID="$(python -c "import json,sys; print(json.load(sys.stdin).get('id',''))" <<< "$SUBMIT_OUTPUT")"

          if [ "$NOTARY_STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $NOTARY_STATUS"
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
                --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi

          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Upload .dmg to Artifacts
        if: ${{ inputs.upload_artifacts && !inputs.freeze_only }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozSetup-x64.dmg
          path: target/*.dmg
          retention-days: 2

      - name: Publish x64 .dmg to Release
        if: ${{ inputs.publish_to_release && !inputs.freeze_only && inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.release_tag }}
          draft: ${{ inputs.release_draft }}
          prerelease: ${{ inputs.release_prerelease }}
          files: target/*.dmg
          fail_on_unmatched_files: true

      - name: Upload target folder for debug
        if: ${{ inputs.freeze_only && inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozTarget-x64
          path: target/**
          retention-days: 2

  build_dmg_arm64:
    if: ${{ inputs.build_macos && inputs.build_macos_arm64 }}
    runs-on: macos-14
    env:
      APPLE_TEAM_ID: UDE82H2SDR
      APP_BUNDLE_ID: com.snooztoolbox
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          repository: ${{ contains(inputs.source_repo, '/') && inputs.source_repo || format('SnoozToolbox/{0}', inputs.source_repo) }}
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.GH_PAT }}

      - name: Patch is_dev for release
        run: |
          sed -i '' 's/is_dev = True/is_dev = False/' src/main/python/config.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10.11'

      - name: Print macOS architecture
        run: |
          echo "runner.os=${{ runner.os }}"
          echo "runner.arch=${{ runner.arch }}"
          echo "target.arch=arm64"
          uname -m
          arch
          sysctl -n machdep.cpu.brand_string


      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

          MAX_ATTEMPTS=5
          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            curl --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 --connect-timeout 20 --max-time 180 \
              -H "Accept: application/octet-stream" \
              -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -o fbs-pro.tar.gz \
              "https://api.github.com/repos/SnoozToolbox/fbs-pro-version/releases/assets/${{ secrets.FBS_ASSET_ID }}" && break

            if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
              echo "Failed to download fbs-pro.tar.gz after $MAX_ATTEMPTS attempts"
              exit 1
            fi

            echo "Retrying fbs-pro download (attempt $ATTEMPT/$MAX_ATTEMPTS)"
            sleep $((ATTEMPT * 3))
          done

          test -s fbs-pro.tar.gz
          pip install fbs-pro.tar.gz

      - name: Print active source revision and mne hook (macOS arm64)
        if: ${{ inputs.verify_hooks_macos }}
        run: |
          echo "source_repo=${{ inputs.source_repo }}"
          echo "source_ref=${{ inputs.source_ref }}"
          git rev-parse HEAD
          if [ -f src/hooks/hook-mne.py ]; then
            echo "Active hook file: src/hooks/hook-mne.py"
            sed -n '1,200p' src/hooks/hook-mne.py
          else
            echo "::warning::src/hooks/hook-mne.py not found in checked out source."
          fi
          python - <<'PY'
          import importlib.util
          import pathlib
          import sys

          print("python:", sys.version)
          try:
              import PyInstaller  # type: ignore
              print("pyinstaller:", PyInstaller.__version__)
          except Exception as exc:
              print("pyinstaller: unavailable", repr(exc))

          spec = importlib.util.find_spec("mne")
          if spec is None or spec.origin is None:
              print("::error::mne package not found after dependency install.")
              raise SystemExit(1)

          pkg_dir = pathlib.Path(spec.origin).parent
          init_py = pkg_dir / "__init__.py"
          init_pyi = pkg_dir / "__init__.pyi"
          print("mne package dir:", pkg_dir)
          print("mne __init__.py exists:", init_py.exists(), init_py)
          print("mne __init__.pyi exists:", init_pyi.exists(), init_pyi)
          if not init_pyi.exists():
              print("::error::mne/__init__.pyi is missing in site-packages before freeze.")
              raise SystemExit(1)
          PY

      - name: Configure Apple signing certificate
        if: ${{ inputs.sign_macos }}
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_P12_PASSWORD }}
          APPLE_CI_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          security delete-keychain build.keychain >/dev/null 2>&1 || true
          security delete-keychain "$KEYCHAIN_PATH" >/dev/null 2>&1 || true
          printf '%s' "$APPLE_CERT_P12_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$APPLE_CI_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$APPLE_CI_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERT_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_CI_KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$HOME/Library/Keychains/login.keychain-db" "/Library/Keychains/System.keychain"
          rm -f certificate.p12

      - name: Freeze app with fbs
        run: |
          if [ "${{ inputs.freeze_only }}" = "true" ]; then
            fbs freeze --debug
          else
            fbs freeze
          fi

      - name: Ensure required mne stub exists in app bundle (macOS arm64)
        run: |
          set -eo pipefail
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in target/."
            ls -la target || true
            exit 1
          fi

          MNE_STUB_SRC="$(python - <<'PY'
          import importlib.util
          import pathlib

          spec = importlib.util.find_spec('mne')
          if spec is None or spec.origin is None:
              raise SystemExit(1)

          stub = pathlib.Path(spec.origin).parent / '__init__.pyi'
          if not stub.exists():
              raise SystemExit(1)

          print(stub)
          PY
          )"

          if [ -z "$MNE_STUB_SRC" ]; then
            echo "::error::Unable to locate mne/__init__.pyi in site-packages."
            exit 1
          fi

          mkdir -p "$APP_PATH/Contents/Resources/mne"
          cp "$MNE_STUB_SRC" "$APP_PATH/Contents/Resources/mne/__init__.pyi"
          echo "Copied required stub: $MNE_STUB_SRC -> $APP_PATH/Contents/Resources/mne/__init__.pyi"

      - name: Copy PSGReader extensions (macOS arm64)
        run: |
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          mkdir -p "$APP_PATH/Contents/Resources/extension/PSGReader"
          cp -r src/main/resources/mac/extension/PSGReader/. "$APP_PATH/Contents/Resources/extension/PSGReader/"
          cp -r src/main/resources/mac/mac-arm64/extension/PSGReader/. "$APP_PATH/Contents/Resources/extension/PSGReader/"

      - name: Copy missing packages (macOS)
        if: ${{ inputs.copy_missing_packages_macos }}
        run: |
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          APP_PATH="$APP_PATH" python -c "import os, shutil, sysconfig; from pathlib import Path; site=Path(sysconfig.get_paths()['purelib']); dest=Path(os.environ['APP_PATH'])/'Contents'/'Resources'; dest.mkdir(parents=True, exist_ok=True); pkgs=('mne','lazy_loader','lspopt','yasa'); [shutil.rmtree(dest/p, ignore_errors=True) or shutil.copytree(site/p, dest/p, dirs_exist_ok=True) for p in pkgs]"

      - name: Verify PyInstaller hook outputs (macOS)
        if: ${{ inputs.verify_hooks_macos }}
        run: |
          ANALYSIS_TOC="$(find target -type f -name 'Analysis-00.toc' | head -n 1)"
          if [ -z "$ANALYSIS_TOC" ]; then
            echo "::error::Analysis-00.toc not found. Unable to validate hook packaging output."
            exit 1
          fi
          echo "Using analysis file: $ANALYSIS_TOC"

          WARN_FILE="$(find "$(dirname "$ANALYSIS_TOC")" -maxdepth 1 -type f -name 'warn-*.txt' | head -n 1)"
          if [ -n "$WARN_FILE" ]; then
            echo "Using warning file: $WARN_FILE"
          else
            echo "No warn-*.txt file found next to Analysis-00.toc"
          fi

          MISSING=()
          for PKG in mne lazy_loader lspopt yasa; do
            if grep -qi "'$PKG'" "$ANALYSIS_TOC"; then
              echo "Package appears in analysis: $PKG"
            else
              echo "Package missing from analysis: $PKG"
              MISSING+=("$PKG")
            fi

            if [ -n "$WARN_FILE" ] && grep -Eqi "missing module named .*${PKG}|No module named .*${PKG}" "$WARN_FILE"; then
              echo "::warning::Potential unresolved module mention for $PKG in $WARN_FILE"
            fi
          done

          if [ "${#MISSING[@]}" -gt 0 ]; then
            UNIQUE_MISSING="$(printf '%s\n' "${MISSING[@]}" | sort -u | tr '\n' ' ')"
            echo "::error::Hook validation failed for required packages: $UNIQUE_MISSING"
            echo "Inspect hook files in src/hooks and PyInstaller analysis outputs before signing/notarization."
            exit 1
          fi

      - name: Verify required packages inside app bundle (macOS arm64)
        run: |
          set -eo pipefail
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in target/."
            ls -la target || true
            exit 1
          fi

          for PKG in mne lazy_loader lspopt yasa; do
            if find "$APP_PATH/Contents" \( -type d -name "$PKG" -o -type f -name "$PKG.py" \) -print -quit | grep -q .; then
              echo "Package found in app bundle: $PKG"
            else
              echo "::warning::Package not found as loose file in app bundle: $PKG (may be embedded in PyInstaller archive)"
            fi
          done

      - name: Verify required stubs inside app bundle (macOS arm64)
        run: |
          set -eo pipefail
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in target/."
            ls -la target || true
            exit 1
          fi

          MNE_INIT="$(find "$APP_PATH/Contents" -type f -path '*/mne/__init__.py' | head -n 1)"
          if [ -n "$MNE_INIT" ]; then
            echo "mne __init__.py location: $MNE_INIT"
            echo "Expected sibling stub: ${MNE_INIT%__init__.py}__init__.pyi"
          else
            echo "mne __init__.py not found as loose file under app bundle (may be in PYZ archive)."
          fi

          REQUIRED_STUB="$(find "$APP_PATH/Contents" -type f -path '*/mne/__init__.pyi' | head -n 1)"
          if [ -z "$REQUIRED_STUB" ]; then
            echo "::error::Required stub file missing from app bundle: mne/__init__.pyi"
            ANALYSIS_TOC="$(find target -type f -name 'Analysis-00.toc' | head -n 1)"
            if [ -n "$ANALYSIS_TOC" ]; then
              echo "Relevant Analysis-00.toc entries (mne/__init__.py and mne/__init__.pyi):"
              grep -E "mne[/\\]__init__\.py(i)?" "$ANALYSIS_TOC" || true
            fi
            find "$APP_PATH/Contents" -type f -name '*.pyi' | sort || true
            exit 1
          fi
          echo "Found required stub: $REQUIRED_STUB"

      - name: Smoke test app bundle launch (macOS arm64)
        run: |
          set -eo pipefail
          echo "PWD=$(pwd)"
          ls -la || true
          ls -la target || true
          find target -maxdepth 4 -type d -name '*.app' -print || true

          APP_PATH="$(find target -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in target/."
            ls -la target || true
            exit 1
          fi
          echo "APP_PATH=$APP_PATH"

          APP_EXEC="$(find "$APP_PATH/Contents/MacOS" -maxdepth 1 -type f -perm -111 | head -n 1)"
          if [ -z "$APP_EXEC" ]; then
            echo "::error::No executable found inside app bundle."
            find "$APP_PATH/Contents/MacOS" -maxdepth 2 -print || true
            exit 1
          fi
          echo "APP_EXEC=$APP_EXEC"

          LOG_FILE="$(mktemp /tmp/snooz-app-smoke.XXXXXX.log)"
          APP_PID=""
          cleanup() {
            if [ -n "$APP_PID" ] && kill -0 "$APP_PID" >/dev/null 2>&1; then
              kill "$APP_PID" >/dev/null 2>&1 || true
              wait "$APP_PID" >/dev/null 2>&1 || true
            fi
            rm -f "$LOG_FILE"
          }
          trap cleanup EXIT

          echo "Launching app executable for smoke test"
          "$APP_EXEC" >"$LOG_FILE" 2>&1 &
          APP_PID=$!
          echo "APP_PID=$APP_PID"
          sleep 20

          if ! kill -0 "$APP_PID" >/dev/null 2>&1; then
            set +e
            wait "$APP_PID"
            APP_STATUS=$?
            set -e
            echo "App process exited during smoke window"
            cat "$LOG_FILE" || true
            if [ "$APP_STATUS" -ne 0 ]; then
              echo "::error::App exited during smoke test with status $APP_STATUS"
              exit "$APP_STATUS"
            fi
          else
            echo "App process is still running after smoke window"
          fi

          if grep -Eqi "ModuleNotFoundError|ImportError|Traceback|Library not loaded|dlopen\\(" "$LOG_FILE"; then
            cat "$LOG_FILE" || true
            echo "::error::App launch log contains import or dynamic library errors."
            exit 1
          fi

      - name: Sign Snooz.app
        if: ${{ inputs.sign_macos && !inputs.freeze_only }}
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          PLIST_PATH="$APP_PATH/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $APP_BUNDLE_ID" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string $APP_BUNDLE_ID" "$PLIST_PATH"

          find "$APP_PATH" -mindepth 1 -type d -name '*.app' -print0 | while IFS= read -r -d '' NESTED_APP; do
            codesign --force --options runtime --timestamp \
              --keychain "$KEYCHAIN_PATH" \
              --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
              "$NESTED_APP"
          done

          find "$APP_PATH" -type f -perm -111 ! -name '*.py' ! -name '*.pyc' ! -name '*.pyo' -print0 | while IFS= read -r -d '' BIN; do
            codesign --force --timestamp --options runtime \
              --keychain "$KEYCHAIN_PATH" \
              --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
              "$BIN"
          done

          find "$APP_PATH" -type f \( -name '*.so' -o -name '*.dylib' \) -print0 | while IFS= read -r -d '' BIN; do
            codesign --force --timestamp --options runtime \
              --keychain "$KEYCHAIN_PATH" \
              --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
              "$BIN"
          done

          find "$APP_PATH" -type f -name '*.pyi' -print0 | while IFS= read -r -d '' STUB; do
            codesign --force --timestamp \
              --keychain "$KEYCHAIN_PATH" \
              --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
              "$STUB"
          done

          codesign --force --options runtime --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
            "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          if ! spctl -a -t exec -vv "$APP_PATH"; then
            echo "Pre-notarization spctl assessment rejected (expected on some CI hosts)."
          fi

      - name: Notarize and staple Snooz.app
        if: ${{ inputs.sign_macos && !inputs.freeze_only }}
        run: |
          set -eo pipefail
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          APP_NAME="$(basename "$APP_PATH")"
          APP_ZIP="target/${APP_NAME}.zip"

          rm -f "$APP_ZIP"
          ditto -c -k --keepParent "$APP_PATH" "$APP_ZIP"

          APP_SUBMIT_OUTPUT="$(xcrun notarytool submit "$APP_ZIP" \
            --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
            --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)"

          echo "$APP_SUBMIT_OUTPUT"
          APP_NOTARY_STATUS="$(python -c "import json,sys; print(json.load(sys.stdin).get('status',''))" <<< "$APP_SUBMIT_OUTPUT")"
          APP_SUBMISSION_ID="$(python -c "import json,sys; print(json.load(sys.stdin).get('id',''))" <<< "$APP_SUBMIT_OUTPUT")"

          if [ "$APP_NOTARY_STATUS" != "Accepted" ]; then
            echo "App notarization failed with status: $APP_NOTARY_STATUS"
            if [ -n "$APP_SUBMISSION_ID" ]; then
              xcrun notarytool log "$APP_SUBMISSION_ID" \
                --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
                --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          rm -f "$APP_ZIP"

      - name: Build .dmg Installer
        if: ${{ !inputs.freeze_only }}
        run: |
          set -eo pipefail
          echo "Building DMG with fbs installer"
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          APP_NAME="$(basename "$APP_PATH")"
          APP_BASE_NAME="${APP_NAME%.app}"
          VOL_PATH="/Volumes/$APP_BASE_NAME"
          FINAL_DMG_PATH="target/${APP_BASE_NAME}.dmg"
          RW_DMG_PATH="target/rw.${APP_BASE_NAME}.dmg"

          cleanup_volume() {
            if mount | grep -q "on $VOL_PATH "; then
              echo "Detaching leftover mounted volume $VOL_PATH"
              hdiutil detach "$VOL_PATH" -force || true
            fi
          }

          cleanup_volume

          MAX_ATTEMPTS=3
          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            rm -f "$FINAL_DMG_PATH" "$RW_DMG_PATH"
            echo "fbs DMG attempt $ATTEMPT/$MAX_ATTEMPTS"

            set +e
            fbs installer
            FBS_STATUS=$?
            set -e

            cleanup_volume

            if [ -f "$FINAL_DMG_PATH" ]; then
              echo "DMG created successfully."
              break
            fi

            if [ -f "$RW_DMG_PATH" ]; then
              echo "Temporary rw DMG found. Attempting to recover final DMG."
              CONVERT_STATUS=1
              CONVERT_MAX_ATTEMPTS=5
              for CONVERT_ATTEMPT in $(seq 1 "$CONVERT_MAX_ATTEMPTS"); do
                rm -f "$FINAL_DMG_PATH"
                set +e
                hdiutil convert "$RW_DMG_PATH" -format UDZO -o "$FINAL_DMG_PATH"
                CONVERT_STATUS=$?
                set -e

                if [ "$CONVERT_STATUS" -eq 0 ] && [ -f "$FINAL_DMG_PATH" ]; then
                  break
                fi

                if [ "$CONVERT_ATTEMPT" -lt "$CONVERT_MAX_ATTEMPTS" ]; then
                  echo "hdiutil convert retry $CONVERT_ATTEMPT/$CONVERT_MAX_ATTEMPTS after transient failure."
                  sleep $((CONVERT_ATTEMPT * 2))
                fi
              done

              if [ "$CONVERT_STATUS" -eq 0 ] && [ -f "$FINAL_DMG_PATH" ]; then
                rm -f "$RW_DMG_PATH" || true
                echo "DMG recovered successfully from temporary image."
                break
              fi
            fi

            if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
              EXIT_CODE="$FBS_STATUS"
              if [ "$EXIT_CODE" -eq 0 ]; then
                EXIT_CODE=1
              fi
              echo "fbs installer failed after $MAX_ATTEMPTS attempts (last exit: $FBS_STATUS)."
              hdiutil info || true
              exit "$EXIT_CODE"
            fi

            echo "Retrying fbs installer after cleanup..."
            sleep 3
          done
          ls -la target/*.dmg

      - name: Verify required packages inside .dmg (macOS arm64)
        if: ${{ !inputs.freeze_only }}
        run: |
          set -eo pipefail
          DMG_PATH="$(find target -maxdepth 1 -type f -name '*.dmg' ! -name 'rw.*' | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "::error::No final DMG found in target/."
            ls -la target || true
            exit 1
          fi

          MOUNT_DIR="$(mktemp -d /tmp/snooz-dmg-check.XXXXXX)"
          cleanup() {
            hdiutil detach "$MOUNT_DIR" -force >/dev/null 2>&1 || true
            rmdir "$MOUNT_DIR" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_DIR" -nobrowse -readonly
          APP_IN_DMG="$(find "$MOUNT_DIR" -maxdepth 2 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_IN_DMG" ]; then
            echo "::error::No .app bundle found inside DMG."
            find "$MOUNT_DIR" -maxdepth 3 -print || true
            exit 1
          fi

          for PKG in mne lazy_loader lspopt yasa; do
            if find "$APP_IN_DMG/Contents" \( -type d -name "$PKG" -o -type f -name "$PKG.py" \) -print -quit | grep -q .; then
              echo "Package found in DMG app bundle: $PKG"
            else
              echo "::warning::Package not found as loose file in DMG app bundle: $PKG (may be embedded in PyInstaller archive)"
            fi
          done

      - name: Verify required stubs inside .dmg (macOS arm64)
        if: ${{ !inputs.freeze_only }}
        run: |
          set -eo pipefail
          DMG_PATH="$(find target -maxdepth 1 -type f -name '*.dmg' ! -name 'rw.*' | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "::error::No final DMG found in target/."
            ls -la target || true
            exit 1
          fi

          MOUNT_DIR="$(mktemp -d /tmp/snooz-dmg-stub-check.XXXXXX)"
          cleanup() {
            hdiutil detach "$MOUNT_DIR" -force >/dev/null 2>&1 || true
            rmdir "$MOUNT_DIR" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_DIR" -nobrowse -readonly
          APP_IN_DMG="$(find "$MOUNT_DIR" -maxdepth 2 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_IN_DMG" ]; then
            echo "::error::No .app bundle found inside DMG."
            find "$MOUNT_DIR" -maxdepth 3 -print || true
            exit 1
          fi

          MNE_INIT="$(find "$APP_IN_DMG/Contents" -type f -path '*/mne/__init__.py' | head -n 1)"
          if [ -n "$MNE_INIT" ]; then
            echo "mne __init__.py location in DMG app: $MNE_INIT"
            echo "Expected sibling stub in DMG app: ${MNE_INIT%__init__.py}__init__.pyi"
          else
            echo "mne __init__.py not found as loose file in DMG app bundle (may be in PYZ archive)."
          fi

          REQUIRED_STUB="$(find "$APP_IN_DMG/Contents" -type f -path '*/mne/__init__.pyi' | head -n 1)"
          if [ -z "$REQUIRED_STUB" ]; then
            echo "::error::Required stub file missing from DMG app bundle: mne/__init__.pyi"
            find "$APP_IN_DMG/Contents" -type f -name '*.pyi' | sort || true
            exit 1
          fi
          echo "Found required stub: $REQUIRED_STUB"

      - name: Smoke test app launch from .dmg (macOS arm64)
        if: ${{ !inputs.freeze_only }}
        run: |
          set -eo pipefail
          DMG_PATH="$(find target -maxdepth 1 -type f -name '*.dmg' ! -name 'rw.*' | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "::error::No final DMG found in target/."
            ls -la target || true
            exit 1
          fi

          MOUNT_DIR="$(mktemp -d /tmp/snooz-dmg-smoke.XXXXXX)"
          LOG_FILE="$(mktemp /tmp/snooz-dmg-smoke.XXXXXX.log)"
          APP_PID=""
          cleanup() {
            if [ -n "$APP_PID" ] && kill -0 "$APP_PID" >/dev/null 2>&1; then
              kill "$APP_PID" >/dev/null 2>&1 || true
              wait "$APP_PID" >/dev/null 2>&1 || true
            fi
            hdiutil detach "$MOUNT_DIR" -force >/dev/null 2>&1 || true
            rmdir "$MOUNT_DIR" >/dev/null 2>&1 || true
            rm -f "$LOG_FILE"
          }
          trap cleanup EXIT

          hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_DIR" -nobrowse -readonly
          APP_IN_DMG="$(find "$MOUNT_DIR" -maxdepth 2 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_IN_DMG" ]; then
            echo "::error::No .app bundle found inside DMG."
            find "$MOUNT_DIR" -maxdepth 3 -print || true
            exit 1
          fi

          APP_EXEC="$(find "$APP_IN_DMG/Contents/MacOS" -maxdepth 1 -type f -perm -111 | head -n 1)"
          if [ -z "$APP_EXEC" ]; then
            echo "::error::No executable found in DMG app bundle."
            find "$APP_IN_DMG/Contents/MacOS" -maxdepth 2 -print || true
            exit 1
          fi
          echo "APP_EXEC=$APP_EXEC"

          "$APP_EXEC" >"$LOG_FILE" 2>&1 &
          APP_PID=$!
          echo "APP_PID=$APP_PID"
          sleep 20

          if ! kill -0 "$APP_PID" >/dev/null 2>&1; then
            set +e
            wait "$APP_PID"
            APP_STATUS=$?
            set -e
            echo "DMG app process exited during smoke window"
            cat "$LOG_FILE" || true
            if [ "$APP_STATUS" -ne 0 ]; then
              echo "::error::DMG app exited during smoke test with status $APP_STATUS"
              exit "$APP_STATUS"
            fi
          else
            echo "DMG app process is still running after smoke window"
          fi

          if grep -Eqi "ModuleNotFoundError|ImportError|Traceback|Library not loaded|dlopen\\(" "$LOG_FILE"; then
            cat "$LOG_FILE" || true
            echo "::error::DMG app launch log contains import or dynamic library errors."
            exit 1
          fi

      - name: Sign, notarize and staple .dmg
        if: ${{ inputs.sign_macos && !inputs.freeze_only }}
        run: |
          set -eo pipefail
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          DMG_PATH="$(find target -maxdepth 1 -type f -name '*.dmg' ! -name 'rw.*' | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "No final DMG found in target/."
            ls -la target || true
            exit 1
          fi
          echo "DMG_PATH=$DMG_PATH"
          xattr -cr "$DMG_PATH"
          codesign --force --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
            "$DMG_PATH"

          SUBMIT_OUTPUT="$(xcrun notarytool submit "$DMG_PATH" \
            --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
            --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)"

          echo "$SUBMIT_OUTPUT"
          NOTARY_STATUS="$(python -c "import json,sys; print(json.load(sys.stdin).get('status',''))" <<< "$SUBMIT_OUTPUT")"
          SUBMISSION_ID="$(python -c "import json,sys; print(json.load(sys.stdin).get('id',''))" <<< "$SUBMIT_OUTPUT")"

          if [ "$NOTARY_STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $NOTARY_STATUS"
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
                --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi

          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Upload .dmg to Artifacts
        if: ${{ inputs.upload_artifacts && !inputs.freeze_only }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozSetup-arm64.dmg
          path: target/*.dmg
          retention-days: 2

      - name: Publish arm64 .dmg to Release
        if: ${{ inputs.publish_to_release && !inputs.freeze_only && inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.release_tag }}
          draft: ${{ inputs.release_draft }}
          prerelease: ${{ inputs.release_prerelease }}
          files: target/*.dmg
          fail_on_unmatched_files: true

      - name: Upload target folder for debug
        if: ${{ inputs.freeze_only && inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozTarget-arm64
          path: target/**
          retention-days: 2

  build_linux:
    runs-on: ubuntu-22.04
    if: ${{ inputs.build_linux }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          repository: ${{ contains(inputs.source_repo, '/') && inputs.source_repo || format('SnoozToolbox/{0}', inputs.source_repo) }}
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.GH_PAT }}

      - name: Patch is_dev for release
        run: |
          sed -i 's/is_dev = True/is_dev = False/' src/main/python/config.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          MAX_ATTEMPTS=5
          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            curl --fail --silent --show-error --location --retry 5 --retry-all-errors --retry-delay 3 --connect-timeout 20 --max-time 180 \
              -H "Accept: application/octet-stream" \
              -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -o fbs-pro.tar.gz \
              "https://api.github.com/repos/SnoozToolbox/fbs-pro-version/releases/assets/${{ secrets.FBS_ASSET_ID }}" && break

            if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
              echo "Failed to download fbs-pro.tar.gz after $MAX_ATTEMPTS attempts"
              exit 1
            fi

            echo "Retrying fbs-pro download (attempt $ATTEMPT/$MAX_ATTEMPTS)"
            sleep $((ATTEMPT * 3))
          done

          test -s fbs-pro.tar.gz
          pip install fbs-pro.tar.gz

      - name: Install fpm
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rubygems zip
          sudo gem install --no-document fpm
          fpm --version

      - name: Freeze app with fbs
        run: |
          fbs freeze

      - name: Copy missing packages (Linux)
        run: |
          python -c "import shutil, sysconfig; from pathlib import Path; site=Path(sysconfig.get_paths()['purelib']); dest=Path('target/Snooz/_internal'); dest.mkdir(parents=True, exist_ok=True); pkgs=('mne','lazy_loader','lspopt','yasa'); [shutil.rmtree(dest/p, ignore_errors=True) or shutil.copytree(site/p, dest/p, dirs_exist_ok=True) for p in pkgs]"

      - name: Build Linux installer (.deb)
        run: |
          fbs installer

      - name: Build Linux portable package (.zip)
        run: |
          cd target
          zip -r SnoozSetup-portable-linux.zip Snooz

      - name: Validate Linux package outputs
        run: |
          ls -la target
          ls target/*.deb
          ls target/*.zip

      - name: Upload Linux installer artifact
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozSetup-linux
          path: |
            target/*.zip
            target/*.deb
          retention-days: 2