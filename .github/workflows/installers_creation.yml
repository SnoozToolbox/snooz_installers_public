name: Build binaries

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Build Windows installer'
        required: true
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS installer'
        required: true
        type: boolean
        default: true
      build_macos_intel:
        description: 'Build macOS Intel (x64) installer'
        required: true
        type: boolean
        default: true
      build_macos_arm64:
        description: 'Build macOS Apple Silicon (arm64) installer'
        required: true
        type: boolean
        default: true
      sign_macos:
        description: 'Sign and notarize macOS artifacts'
        required: true
        type: boolean
        default: true
      dmg_builder:
        description: 'macOS DMG builder strategy'
        required: true
        type: choice
        options:
          - hdiutil
          - fbs
        default: hdiutil
      build_linux:
        description: 'Build Linux installer (zip)'
        required: true
        type: boolean
        default: true
      source_repo:
        description: 'Source repository (owner/name or repo only; owner defaults to SnoozToolbox)'
        required: true
        default: 'SnoozToolbox/snooz-toolbox'
      source_ref:
        description: 'Branch, tag, or commit SHA from source_repo'
        required: true
        default: 'main'
      upload_artifacts:
        description: 'Upload installers as workflow artifacts'
        required: true
        type: boolean
        default: false

jobs:
  build_exe:
    runs-on: windows-2022
    if: ${{ inputs.build_windows }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          repository: ${{ contains(inputs.source_repo, '/') && inputs.source_repo || format('SnoozToolbox/{0}', inputs.source_repo) }}
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.GH_PAT }}

      - name: Patch is_dev for release
        shell: pwsh
        run: |
          $file = "src/main/python/config.py"
          (Get-Content $file) -replace 'is_dev = True', 'is_dev = False' | Set-Content $file

      - name: Set Up python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install fbs pro
        run: |
          curl -L -H "Accept: application/octet-stream" `
               -H "Authorization: Bearer ${{ secrets.GH_PAT }}" `
               -H "X-GitHub-Api-Version: 2022-11-28" `
               -o fbs-pro.tar.gz `
               "https://api.github.com/repos/SnoozToolbox/fbs-pro-version/releases/assets/${{ secrets.FBS_ASSET_ID }}"

          # Install only if it's valid
          pip install fbs-pro.tar.gz

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          choco install vcredist2010 -y
          choco install vcredist2012 -y

      - name: Verify makensis is available
        shell: pwsh
        run: |
          $nsisPath = "C:\Program Files (x86)\NSIS"
          $makensisExe = Join-Path $nsisPath "makensis.exe"
          if (-not (Test-Path $makensisExe)) {
            throw "makensis.exe not found at expected path: $makensisExe"
          }
          $nsisPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & $makensisExe /VERSION

      - name: Freeze app with fbs
        run: |
          fbs freeze

      - name: Copy missing packages (Windows)
        shell: pwsh
        run: |
          python -c "import shutil, sysconfig; from pathlib import Path; site=Path(sysconfig.get_paths()['purelib']); dest=Path('target/Snooz/_internal'); dest.mkdir(parents=True, exist_ok=True); pkgs=('mne','lazy_loader','lspopt','yasa'); [shutil.rmtree(dest/p, ignore_errors=True) or shutil.copytree(site/p, dest/p, dirs_exist_ok=True) for p in pkgs]"

      - name: Build installer with fbs
        run: |
          fbs installer # Generates Test_AppSetup.exe

      - name: Upload Installer to Artifacts
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozSetup.exe
          path: target/*.exe
          retention-days: 2

  build_dmg_intel:
    if: ${{ inputs.build_macos && inputs.build_macos_intel }}
    runs-on: macos-15-intel
    env:
      APPLE_TEAM_ID: UDE82H2SDR
      APP_BUNDLE_ID: com.snooztoolbox
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          repository: ${{ contains(inputs.source_repo, '/') && inputs.source_repo || format('SnoozToolbox/{0}', inputs.source_repo) }}
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.GH_PAT }}

      - name: Patch is_dev for release
        run: |
          sed -i '' 's/is_dev = True/is_dev = False/' src/main/python/config.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10.11'

      - name: Print macOS architecture
        run: |
          echo "runner.os=${{ runner.os }}"
          echo "runner.arch=${{ runner.arch }}"
          echo "target.arch=x64"
          uname -m
          arch
          sysctl -n machdep.cpu.brand_string

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          curl -L -H "Accept: application/octet-stream" \
                -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -o fbs-pro.tar.gz \
                "https://api.github.com/repos/SnoozToolbox/fbs-pro-version/releases/assets/${{ secrets.FBS_ASSET_ID }}"
          pip install fbs-pro.tar.gz

      - name: Configure Apple signing certificate
        if: ${{ inputs.sign_macos }}
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_P12_PASSWORD }}
          APPLE_CI_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          printf '%s' "$APPLE_CERT_P12_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$APPLE_CI_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$APPLE_CI_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERT_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_CI_KEYCHAIN_PASSWORD" build.keychain
          rm -f certificate.p12

      - name: Freeze app with fbs
        run: |
          fbs freeze

      - name: Copy PSGReader extensions (macOS x64)
        run: |
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          mkdir -p "$APP_PATH/Contents/Resources/extension/PSGReader"
          cp -r src/main/resources/mac/extension/PSGReader/. "$APP_PATH/Contents/Resources/extension/PSGReader/"
          cp -r src/main/resources/mac/mac-X64/extension/PSGReader/. "$APP_PATH/Contents/Resources/extension/PSGReader/"

      - name: Prune opposite-architecture resources (macOS x64)
        run: |
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          rm -rf "$APP_PATH/Contents/Resources/mac-arm64"

      - name: Copy missing packages (macOS)
        run: |
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          APP_PATH="$APP_PATH" python -c "import os, shutil, sysconfig; from pathlib import Path; site=Path(sysconfig.get_paths()['purelib']); dest=Path(os.environ['APP_PATH'])/'Contents'/'Frameworks'; dest.mkdir(parents=True, exist_ok=True); pkgs=('mne','lazy_loader','lspopt','yasa'); [shutil.rmtree(dest/p, ignore_errors=True) or shutil.copytree(site/p, dest/p, dirs_exist_ok=True) for p in pkgs]"

      - name: Sign Snooz.app
        if: ${{ inputs.sign_macos }}
        run: |
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          PLIST_PATH="$APP_PATH/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $APP_BUNDLE_ID" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string $APP_BUNDLE_ID" "$PLIST_PATH"

          find "$APP_PATH" -type f \( -name '*.so' -o -name '*.dylib' \) -print0 | while IFS= read -r -d '' BIN; do
            codesign --force --timestamp --options runtime \
              --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
              "$BIN"
          done

          codesign --force --deep --options runtime --timestamp \
            --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
            "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl -a -t exec -vv "$APP_PATH"

      - name: Build .dmg Installer
        run: |
          set -eo pipefail
          if [ "${{ inputs.dmg_builder }}" = "fbs" ]; then
            echo "Building DMG with fbs installer"
            fbs installer
          else
            echo "Building DMG with hdiutil"
            APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
            test -n "$APP_PATH"
            APP_NAME="$(basename "$APP_PATH")"
            APP_BASE_NAME="${APP_NAME%.app}"
            DMG_PATH="target/${APP_BASE_NAME}.dmg"
            STAGE_DIR="$(mktemp -d)/dmg-root"

            mkdir -p "$STAGE_DIR"
            cp -R "$APP_PATH" "$STAGE_DIR/"
            ln -s /Applications "$STAGE_DIR/Applications"

            rm -f "$DMG_PATH"
            hdiutil create -volname "$APP_BASE_NAME" -srcfolder "$STAGE_DIR" -ov -format UDZO "$DMG_PATH"

            rm -rf "$STAGE_DIR"
          fi
          ls -la target/*.dmg

      - name: Sign, notarize and staple .dmg
        if: ${{ inputs.sign_macos }}
        run: |
          set -eo pipefail
          DMG_PATH="$(ls target/*.dmg | head -n 1)"
          echo "DMG_PATH=$DMG_PATH"
          codesign --force --timestamp \
            --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
            "$DMG_PATH"

          SUBMIT_OUTPUT="$(xcrun notarytool submit "$DMG_PATH" \
            --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
            --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)"

          echo "$SUBMIT_OUTPUT"
          NOTARY_STATUS="$(python -c "import json,sys; print(json.load(sys.stdin).get('status',''))" <<< "$SUBMIT_OUTPUT")"
          SUBMISSION_ID="$(python -c "import json,sys; print(json.load(sys.stdin).get('id',''))" <<< "$SUBMIT_OUTPUT")"

          if [ "$NOTARY_STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $NOTARY_STATUS"
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
                --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi

          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Upload .dmg to Artifacts
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozSetup-x64.dmg
          path: target/*.dmg
          retention-days: 2

  build_dmg_arm64:
    if: ${{ inputs.build_macos && inputs.build_macos_arm64 }}
    runs-on: macos-14
    env:
      APPLE_TEAM_ID: UDE82H2SDR
      APP_BUNDLE_ID: com.snooztoolbox
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          repository: ${{ contains(inputs.source_repo, '/') && inputs.source_repo || format('SnoozToolbox/{0}', inputs.source_repo) }}
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.GH_PAT }}

      - name: Patch is_dev for release
        run: |
          sed -i '' 's/is_dev = True/is_dev = False/' src/main/python/config.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10.11'

      - name: Print macOS architecture
        run: |
          echo "runner.os=${{ runner.os }}"
          echo "runner.arch=${{ runner.arch }}"
          echo "target.arch=arm64"
          uname -m
          arch
          sysctl -n machdep.cpu.brand_string


      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          curl -L -H "Accept: application/octet-stream" \
                -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -o fbs-pro.tar.gz \
                "https://api.github.com/repos/SnoozToolbox/fbs-pro-version/releases/assets/${{ secrets.FBS_ASSET_ID }}"
          pip install fbs-pro.tar.gz

      - name: Configure Apple signing certificate
        if: ${{ inputs.sign_macos }}
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_P12_PASSWORD }}
          APPLE_CI_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          printf '%s' "$APPLE_CERT_P12_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$APPLE_CI_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$APPLE_CI_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERT_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_CI_KEYCHAIN_PASSWORD" build.keychain
          rm -f certificate.p12

      - name: Freeze app with fbs
        run: |
          fbs freeze

      - name: Copy PSGReader extensions (macOS arm64)
        run: |
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          mkdir -p "$APP_PATH/Contents/Resources/extension/PSGReader"
          cp -r src/main/resources/mac/extension/PSGReader/. "$APP_PATH/Contents/Resources/extension/PSGReader/"
          cp -r src/main/resources/mac/mac-arm64/extension/PSGReader/. "$APP_PATH/Contents/Resources/extension/PSGReader/"

      - name: Prune opposite-architecture resources (macOS arm64)
        run: |
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          rm -rf "$APP_PATH/Contents/Resources/mac-X64"

      - name: Copy missing packages (macOS)
        run: |
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          APP_PATH="$APP_PATH" python -c "import os, shutil, sysconfig; from pathlib import Path; site=Path(sysconfig.get_paths()['purelib']); dest=Path(os.environ['APP_PATH'])/'Contents'/'Frameworks'; dest.mkdir(parents=True, exist_ok=True); pkgs=('mne','lazy_loader','lspopt','yasa'); [shutil.rmtree(dest/p, ignore_errors=True) or shutil.copytree(site/p, dest/p, dirs_exist_ok=True) for p in pkgs]"

      - name: Sign Snooz.app
        if: ${{ inputs.sign_macos }}
        run: |
          APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          PLIST_PATH="$APP_PATH/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $APP_BUNDLE_ID" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string $APP_BUNDLE_ID" "$PLIST_PATH"

          find "$APP_PATH" -type f \( -name '*.so' -o -name '*.dylib' \) -print0 | while IFS= read -r -d '' BIN; do
            codesign --force --timestamp --options runtime \
              --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
              "$BIN"
          done

          codesign --force --deep --options runtime --timestamp \
            --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
            "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl -a -t exec -vv "$APP_PATH"

      - name: Build .dmg Installer
        run: |
          set -eo pipefail
          if [ "${{ inputs.dmg_builder }}" = "fbs" ]; then
            echo "Building DMG with fbs installer"
            fbs installer
          else
            echo "Building DMG with hdiutil"
            APP_PATH="$(find target -maxdepth 1 -type d -name '*.app' | head -n 1)"
            test -n "$APP_PATH"
            APP_NAME="$(basename "$APP_PATH")"
            APP_BASE_NAME="${APP_NAME%.app}"
            DMG_PATH="target/${APP_BASE_NAME}.dmg"
            STAGE_DIR="$(mktemp -d)/dmg-root"

            mkdir -p "$STAGE_DIR"
            cp -R "$APP_PATH" "$STAGE_DIR/"
            ln -s /Applications "$STAGE_DIR/Applications"

            rm -f "$DMG_PATH"
            hdiutil create -volname "$APP_BASE_NAME" -srcfolder "$STAGE_DIR" -ov -format UDZO "$DMG_PATH"

            rm -rf "$STAGE_DIR"
          fi
          ls -la target/*.dmg

      - name: Sign, notarize and staple .dmg
        if: ${{ inputs.sign_macos }}
        run: |
          set -eo pipefail
          DMG_PATH="$(ls target/*.dmg | head -n 1)"
          echo "DMG_PATH=$DMG_PATH"
          codesign --force --timestamp \
            --sign "${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}" \
            "$DMG_PATH"

          SUBMIT_OUTPUT="$(xcrun notarytool submit "$DMG_PATH" \
            --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
            --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)"

          echo "$SUBMIT_OUTPUT"
          NOTARY_STATUS="$(python -c "import json,sys; print(json.load(sys.stdin).get('status',''))" <<< "$SUBMIT_OUTPUT")"
          SUBMISSION_ID="$(python -c "import json,sys; print(json.load(sys.stdin).get('id',''))" <<< "$SUBMIT_OUTPUT")"

          if [ "$NOTARY_STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $NOTARY_STATUS"
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
                --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi

          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Upload .dmg to Artifacts
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozSetup-arm64.dmg
          path: target/*.dmg
          retention-days: 2

  build_linux:
    runs-on: ubuntu-22.04
    if: ${{ inputs.build_linux }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          repository: ${{ contains(inputs.source_repo, '/') && inputs.source_repo || format('SnoozToolbox/{0}', inputs.source_repo) }}
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.GH_PAT }}

      - name: Patch is_dev for release
        run: |
          sed -i 's/is_dev = True/is_dev = False/' src/main/python/config.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          curl -L -H "Accept: application/octet-stream" \
                -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -o fbs-pro.tar.gz \
                "https://api.github.com/repos/SnoozToolbox/fbs-pro-version/releases/assets/${{ secrets.FBS_ASSET_ID }}"
          pip install fbs-pro.tar.gz

      - name: Install fpm
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rubygems zip
          sudo gem install --no-document fpm
          fpm --version

      - name: Freeze app with fbs
        run: |
          fbs freeze

      - name: Copy missing packages (Linux)
        run: |
          python -c "import shutil, sysconfig; from pathlib import Path; site=Path(sysconfig.get_paths()['purelib']); dest=Path('target/Snooz/_internal'); dest.mkdir(parents=True, exist_ok=True); pkgs=('mne','lazy_loader','lspopt','yasa'); [shutil.rmtree(dest/p, ignore_errors=True) or shutil.copytree(site/p, dest/p, dirs_exist_ok=True) for p in pkgs]"

      - name: Build Linux installer (.deb)
        run: |
          fbs installer

      - name: Build Linux portable package (.zip)
        run: |
          cd target
          zip -r SnoozSetup-portable-linux.zip Snooz

      - name: Validate Linux package outputs
        run: |
          ls -la target
          ls target/*.deb
          ls target/*.zip

      - name: Upload Linux installer artifact
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: SnoozSetup-linux
          path: |
            target/*.zip
            target/*.deb
          retention-days: 2